            gState.gameLogHtml += "<br>🗡️ 【玩家 " + p.id + "】 對【玩家 " + gState.playersData[wielderIdx].id + "】使用了【借刀殺人】，要他攻擊【玩家 " + gState.playersData[victimIdx].id + "】！";
            startWuxieQuery({
                sourceIdx: pIdx,
                targetIdx: wielderIdx,
                cardName: '借刀殺人',
                trickType: 'jiedao',
                extra: { wielderIdx: wielderIdx, victimIdx: victimIdx }
            });
            updateCloud();
        }

        function handlePlayerBlockClick(clickedIdx) {
            if (gState.pending != null || gState.pickCard != null) return;
            if (!gState.isSelectingTarget) return; 
            if (gState.currentPlayerIdx !== myPlayerIdx) return; // 只有當前玩家能點目標
            if (clickedIdx === gState.currentPlayerIdx) return; 
            if (!gState.playersData[clickedIdx].isAlive) return; 

            var targetP = gState.playersData[clickedIdx];
            if (gState.targetSelectCardType === 'snatch' && (!targetP.hand || targetP.hand.length === 0)) {
                alert("該玩家沒有手牌可供順手牽羊！"); return;
            }

            // 劉備仁德：把選定的牌送給點選的玩家
            if (gState.targetSelectCardType === 'rende') {
                if (!confirm("🎁 把這張牌交給【玩家 " + targetP.id + "】？")) return;
                var giver = gState.playersData[gState.currentPlayerIdx];
                var giveIdx = gState.targetSelectCardIdx;
                if (giveIdx >= 0 && giveIdx < giver.hand.length) {
                    var giveCard = giver.hand.splice(giveIdx, 1)[0];
                    if (!targetP.hand) targetP.hand = [];
                    targetP.hand.push(giveCard);
                    gState.gameLogHtml += "<br>🎁 【仁德】【玩家 " + giver.id + "】 把一張牌交給了【玩家 " + targetP.id + "】。";
                }
                giver.selectedIndex = -1;
                cancelTargetSelection();
                updateCloud();
                return;
            }

            // 借刀殺人：兩階段選目標（先持刀者，再被殺者）
            if (gState.targetSelectCardType === 'jiedao') {
                if (gState.jiedaoStep === 'pickWielder') {
                    // 第一步：選持刀者（須有武器）
                    if (!targetP.equip || !targetP.equip.weapon) {
                        alert("【借刀殺人】只能指定「裝備了武器」的角色當持刀者！"); return;
                    }
                    if (!confirm("🗡️ 指定【玩家 " + targetP.id + "】為持刀者？\n（接下來選擇要他攻擊的對象）")) return;
                    gState.jiedaoWielder = clickedIdx;
                    gState.jiedaoStep = 'pickVictim';
                    updateCloud();
                    return;
                } else if (gState.jiedaoStep === 'pickVictim') {
                    // 第二步：選被殺者（不能是持刀者自己）
                    if (clickedIdx === gState.jiedaoWielder) {
                        alert("被攻擊的對象不能是持刀者自己！"); return;
                    }
                    if (!confirm("🎯 讓【玩家 " + gState.playersData[gState.jiedaoWielder].id + "】攻擊【玩家 " + targetP.id + "】？")) return;
                    executeJiedao(gState.currentPlayerIdx, gState.targetSelectCardIdx, gState.jiedaoWielder, clickedIdx);
                    return;
                }
            }

            var confirmAction = confirm("🎯 確定要對【玩家 " + targetP.id + "】發動【" + gState.targetSelectCardName + "】嗎？");
            if (!confirmAction) return;

            executeCardEffectWithTarget(gState.currentPlayerIdx, gState.targetSelectCardIdx, clickedIdx);
        }

        // 丈八蛇矛：點裝備發動。檢查回合、一殺限制後，進入「選第一張牌」模式
        function activateZhangba(pIdx) {
            // 只有當前玩家、自己的視窗可發動
            if (gState.isGameOver || gState.currentPlayerIdx !== pIdx || myPlayerIdx !== pIdx) return;
            if (gState.pending != null || gState.pickCard != null) return;
            if (gState.isDiscardStage) { alert("棄牌階段無法發動【丈八蛇矛】。"); return; }
            if (gState.skipPlayStage) { alert("🎭 你受到【樂不思蜀】影響，本回合跳過出牌階段！"); return; }
            var p = gState.playersData[pIdx];
            if (!p.equip || p.equip.weapon !== 'zhangba') { alert("你沒有裝備【丈八蛇矛】。"); return; }
            if (!p.hand || p.hand.length < 2) { alert("【丈八蛇矛】需要至少兩張手牌才能發動。"); return; }
            // 一殺限制：丈八組成的是「殺」，若本回合已出過殺且無連弩/咆哮 → 擋住
            var canMultiKill = playerHasSkill(pIdx, 'zhangfei') || (p.equip && p.equip.weapon === 'crossbow');
            if (gState.hasUsedKillThisTurn && !canMultiKill) {
                alert("⚔️ 你本回合已經使用過【殺】了，無法再用【丈八蛇矛】出殺！");
                return;
            }
            // 進入「選第一張牌」模式
            gState.zhangbaActive = true;
            gState.zhangbaFirst = -1;
            p.selectedIndex = -1;
            gState.gameLogHtml += "<br>🐍 【玩家 " + p.id + "】 發動【丈八蛇矛】，請點選兩張手牌組成【殺】。";
            updateCloud();
        }

        // 丈八蛇矛：選擇第二張牌，與第一張組成一個【殺】
        function pickZhangbaSecond(pIdx, cardIdx) {
            if (!gState.zhangbaActive) return false;
            if (myPlayerIdx !== pIdx) return false;
            var p = gState.playersData[pIdx];
            // 還沒選第一張：這次點擊就是第一張
            if (gState.zhangbaFirst === -1) {
                if (cardIdx < 0 || cardIdx >= p.hand.length) return true;
                gState.zhangbaFirst = cardIdx;
                p.selectedIndex = cardIdx;
                gState.gameLogHtml += "<br>🐍 已選第一張，請再點選第二張手牌。";
                updateCloud();
                return true;
            }
            var firstIdx = gState.zhangbaFirst;
            if (cardIdx === firstIdx) { alert("請選擇「另一張」不同的手牌。"); return true; }
            if (firstIdx < 0 || firstIdx >= p.hand.length || cardIdx < 0 || cardIdx >= p.hand.length) {
                // 索引失效，取消丈八
                gState.zhangbaActive = false; gState.zhangbaFirst = -1; updateCloud(); return true;
            }
            // 二次確認一殺限制（防止發動後狀態改變）
            var canMultiKill2 = playerHasSkill(pIdx, 'zhangfei') || (p.equip && p.equip.weapon === 'crossbow');
            if (gState.hasUsedKillThisTurn && !canMultiKill2) {
                alert("⚔️ 你本回合已經使用過【殺】了！");
                gState.zhangbaActive = false; gState.zhangbaFirst = -1;
                p.selectedIndex = -1; updateCloud(); return true;
            }
            // 取出兩張牌（先取大索引避免位移錯亂）
            var hi = Math.max(firstIdx, cardIdx), lo = Math.min(firstIdx, cardIdx);
            var cardA = p.hand[lo], cardB = p.hand[hi];
            p.hand.splice(hi, 1); p.hand.splice(lo, 1);
            if (!gState.discardPile) gState.discardPile = [];
            gState.discardPile.push(cardA); gState.discardPile.push(cardB);
            recordPlayedCard(cardA, p.id);
            gState.zhangbaActive = false; gState.zhangbaFirst = -1;
            p.selectedIndex = -1;
            // 組成一個虛擬殺，進入選目標流程
            gState.hasUsedKillThisTurn = true; // 丈八出的算一殺
            gState.gameLogHtml += "<br>🐍 【玩家 " + p.id + "】 用【丈八蛇矛】將兩張牌組成一張【殺】！請選擇攻擊目標。";
            // 用一個臨時殺牌物件走選目標
            gState.isSelectingTarget = true;
            gState.targetSelectCardIdx = -1; // -1 代表是丈八虛擬殺，不從手牌取
            gState.targetSelectCardType = 'kill';
            gState.targetSelectCardName = '殺（丈八蛇矛）';
            gState.zhangbaKillCard = { displayType: 'kill', suit: '🐍', name: '丈八', colorClass: 'black-suit' };
            updateCloud();
            return true;
        }

        function useCard(pIdx) {
            if (gState.isGameOver || gState.currentPlayerIdx !== pIdx || myPlayerIdx !== pIdx || gState.isDiscardStage) return;
            if (gState.pending != null || gState.pickCard != null) return;
            if (gState.skipPlayStage) { alert("🎭 你受到【樂不思蜀】影響，本回合跳過出牌階段！請直接結束回合。"); return; }
            var p = gState.playersData[pIdx];
            var selIdx = p.selectedIndex;
            if (selIdx === -1 || !p.hand) { alert("請先點選一張要使用的手牌！"); return; }
            
            var card = p.hand[selIdx];
            var finalType = card.displayType;

            // 劉備【仁德】：出牌階段可把手牌交給其他角色（裝備牌除外）
            if (playerHasSkill(pIdx, 'liubei') && !isEquipType(finalType)) {
                var useRende = confirm("🎁【仁德】是否把這張【" + getCardNameChinese(finalType) + "】交給其他角色？\n（按「取消」則照原本使用）");
                if (useRende) {
                    gState.isSelectingTarget = true;
                    gState.targetSelectCardIdx = selIdx;
                    gState.targetSelectCardType = 'rende';
                    gState.targetSelectCardName = '仁德贈牌';
                    gState.gameLogHtml += "<br>🎁 【玩家 " + p.id + "】 發動【仁德】，請選擇要贈予的對象。";
                    updateCloud();
                    return;
                }
            }

            // 關羽【武聖】：紅色手牌都可以當作【殺】使用（只看顏色，無例外）
            if (playerHasSkill(pIdx, 'guanyu') && card.colorClass === 'red-suit' && finalType !== 'kill') {
                var asKill = confirm("🗡️【武聖】是否將這張紅色的【" + getCardNameChinese(finalType) + "】當作【殺】使用？\n（按「取消」則照原本的牌使用）");
                if (asKill) {
                    finalType = 'kill'; // 強制當殺處理（後續走出殺流程）
                }
            }

            // 華佗【急救】：紅色手牌（含紅色的殺）都可以當作【桃】使用（自己未滿血時）
            if (playerHasSkill(pIdx, 'huatuo') && card.colorClass === 'red-suit'
                && finalType !== 'peach' && finalType !== 'wuxie'
                && !isEquipType(finalType) && p.hp < p.maxHp) {
                var asPeach = confirm("💊【急救】是否將這張紅色的【" + getCardNameChinese(finalType) + "】當作【桃】使用，回復 1 點血量？\n（按「取消」則照原本的牌使用）");
                if (asPeach) {
                    finalType = 'peach';
                }
            }

            // 張飛【咆哮】或裝備【諸葛連弩】：可使用任意數量的殺
            var canMultiKill = playerHasSkill(pIdx, 'zhangfei') || (p.equip && p.equip.weapon === 'crossbow');
            if (finalType === 'kill' && gState.hasUsedKillThisTurn && !canMultiKill) { alert("⚔️ 每回合限主動使用一次【殺】！"); return; }
            if ((finalType === 'dodge' || finalType === 'wuxie')) { alert("該牌為被動回應牌，無法主動使用！"); return; }
            if (finalType === 'peach' && (p.hp >= p.maxHp)) { alert("您目前為滿血狀態，無法吃【桃】！"); return; }

            var cName = (finalType === 'kill' && card.displayType !== 'kill') ? '殺（武聖）' : getCardNameChinese(finalType);

            if (['kill', 'bridge', 'snatch', 'duel', 'jiedao', 'lebu'].includes(finalType)) {
                gState.isSelectingTarget = true;
                gState.targetSelectCardIdx = selIdx;
                gState.targetSelectCardType = finalType;
                gState.targetSelectCardName = cName;
                if (finalType === 'jiedao') {
                    gState.jiedaoStep = 'pickWielder'; // 借刀第一步：選持刀者
                    gState.jiedaoWielder = -1;
                }
                updateCloud();
                return; 
            }

            // 閃電：延時錦囊，放到「自己」的判定區（之後會在判定後移到下家）
            if (finalType === 'shandian') {
                // 檢查自己判定區是否已有閃電（同名延時錦囊不重複放）
                var hasShandian = (p.judgeZone || []).some(function(c){ return c.displayType === 'shandian'; });
                if (hasShandian) { alert("你的判定區已經有一張【閃電】了！"); return; }
                p.hand.splice(selIdx, 1);
                p.selectedIndex = -1;
                if (!p.judgeZone) p.judgeZone = [];
                p.judgeZone.push(card);
                recordPlayedCard(card, p.id);
                gState.gameLogHtml += "<br>⚡ 【玩家 " + p.id + "】 將【閃電】放置在自己的判定區。";
                updateCloud();
                return;
            }

            // 裝備牌：穿到裝備區（武器/防具），原本裝備換下進棄牌堆
            if (isEquipType(finalType)) {
                var def = getEquipDef(finalType);
                if (!p.equip) p.equip = { weapon: null, armor: null };
                p.hand.splice(selIdx, 1);
                if (!gState.discardPile) gState.discardPile = [];
                p.selectedIndex = -1;
                recordPlayedCard(card, p.id);
                // 換下同格舊裝備
                var oldKey = p.equip[def.slot];
                if (oldKey) {
                    var oldCard = p.equip[def.slot + 'Card'];
                    if (oldCard) gState.discardPile.push(oldCard);
                    gState.gameLogHtml += "<br>🔧 【玩家 " + p.id + "】 換下了【" + (getEquipDef(oldKey) ? getEquipDef(oldKey).name : '裝備') + "】。";
                }
                p.equip[def.slot] = finalType;
                p.equip[def.slot + 'Card'] = card; // 保存牌物件(換下時可棄)
                gState.gameLogHtml += "<br>🛡️ 【玩家 " + p.id + "】 裝備了【" + def.name + "】！";
                updateCloud();
                return;
            }

            p.hand.splice(selIdx, 1);
            if(!gState.discardPile) gState.discardPile = [];
            gState.discardPile.push(card);
            p.selectedIndex = -1;
            recordPlayedCard(card, p.id); // 觸發出牌動畫

            if (finalType === 'peach') {
                gState.gameLogHtml += "<br>💗 【玩家 " + p.id + "】 使用了【桃】，回復 1 點血量。";
                healPlayerBackend(pIdx, 1);
                checkWinConditionBackend();
                updateCloud();
            }
            else if (finalType === 'wuzhong') {
                // 無中生有為錦囊牌，打出後先詢問其他人是否要【無懈可擊】
                gState.gameLogHtml += "<br>🎯 【玩家 " + p.id + "】 打出了【無中生有】！";
                startWuxieQuery({
                    sourceIdx: pIdx,
                    targetIdx: pIdx,
                    cardName: '無中生有',
                    trickType: 'wuzhong',
                    extra: {}
                });
                updateCloud();
            }
            else if (finalType === 'nanman' || finalType === 'wanjian' || finalType === 'taoyuan' || finalType === 'wugu') {
                // 群體錦囊：對全場生效，打出後先詢問無懈
                var trickNames = { nanman: '南蠻入侵', wanjian: '萬箭齊發', taoyuan: '桃園結義', wugu: '五穀豐登' };
                gState.gameLogHtml += "<br>🎴 【玩家 " + p.id + "】 打出了【" + trickNames[finalType] + "】！";
                startWuxieQuery({
                    sourceIdx: pIdx,
                    targetIdx: pIdx,
                    cardName: trickNames[finalType],
                    trickType: finalType,
                    extra: {}
                });
                updateCloud();
            }
        }

        function executeCardEffectWithTarget(pIdx, cardIdx, targetIdx) {
            var p = gState.playersData[pIdx];
            var targetP = gState.playersData[targetIdx];
            var finalType = gState.targetSelectCardType;
            var cName = gState.targetSelectCardName;

            // 丈八蛇矛虛擬殺：cardIdx === -1，牌已在 pickZhangbaSecond 棄掉，不從手牌取
            if (cardIdx === -1 && gState.zhangbaKillCard) {
                var zbCard = gState.zhangbaKillCard;
                gState.zhangbaKillCard = null;
                gState.isSelectingTarget = false;
                p.selectedIndex = -1;
                cancelTargetSelection();
                gState.gameLogHtml += "<br>⚔️ 【玩家 " + p.id + "】 對 【玩家 " + targetP.id + "】 使用了【殺（丈八蛇矛）】！";
                askForDodge(pIdx, targetIdx, zbCard);
                updateCloud();
                return;
            }

            var card = p.hand[cardIdx];

            gState.isSelectingTarget = false;
            p.hand.splice(cardIdx, 1);
            if(!gState.discardPile) gState.discardPile = [];
            p.selectedIndex = -1;
            cancelTargetSelection();
            recordPlayedCard(card, p.id); // 觸發出牌動畫

            // 樂不思蜀：延時錦囊，不進棄牌堆，先問無懈，通過後放到目標判定區
            if (finalType === 'lebu') {
                var hasLebu = (targetP.judgeZone || []).some(function(c){ return c.displayType === 'lebu'; });
                if (hasLebu) {
                    alert("該玩家判定區已有【樂不思蜀】！");
                    p.hand.push(card); // 退回手牌
                    updateCloud();
                    return;
                }
                gState.gameLogHtml += "<br>🎭 【玩家 " + p.id + "】 對 【玩家 " + targetP.id + "】 使用了【樂不思蜀】！";
                startWuxieQuery({
                    sourceIdx: pIdx,
                    targetIdx: targetIdx,
                    cardName: '樂不思蜀',
                    trickType: 'lebu',
                    extra: { card: card }
                });
                updateCloud();
                return;
            }

            gState.discardPile.push(card);

            if (finalType === 'kill') {
                // 【殺】不是錦囊，不能被無懈，直接進入「等對方出閃」
                gState.hasUsedKillThisTurn = true;
                gState.gameLogHtml += "<br>⚔️ 【玩家 " + p.id + "】 對 【玩家 " + targetP.id + "】 使用了【" + cName + "】！";
                askForDodge(pIdx, targetIdx, card); // 傳殺的牌物件供仁王盾判斷顏色
            }
            else if (finalType === 'duel') {
                // 決鬥為錦囊，先問無懈；通過後由「目標方」先出殺
                gState.gameLogHtml += "<br>⚡ 【玩家 " + p.id + "】 向 【玩家 " + targetP.id + "】 發起了【決鬥】！";
                startWuxieQuery({
                    sourceIdx: pIdx,
                    targetIdx: targetIdx,
                    cardName: '決鬥',
                    trickType: 'duel',
                    extra: {}
                });
            }
            else if (finalType === 'bridge' || finalType === 'snatch') {
                // 過河拆橋/順手牽羊為錦囊，先問無懈；通過後進入「選牌」
                gState.gameLogHtml += "<br>" + (finalType === 'bridge' ? "🔵" : "🖐️") +
                    " 【玩家 " + p.id + "】 對 【玩家 " + targetP.id + "】 發動了【" + cName + "】！";
                startWuxieQuery({
                    sourceIdx: pIdx,
                    targetIdx: targetIdx,
                    cardName: cName,
                    trickType: finalType,
                    extra: {}
                });
            }
            // 統一寫回雲端（部分分支內部可能已 update，再寫一次內容相同無害）
            updateCloud();
        }

        // =====================================================================
        //  待回應流程：無懈可擊詢問
        // =====================================================================
        // 對「錦囊類」效果，依序詢問每個有【無懈可擊】的玩家是否反制。
        // wuxieParity 記錄目前被無懈的次數：偶數=錦囊有效，奇數=被無懈抵消。
        function startWuxieQuery(payload) {
            // payload: { sourceIdx, targetIdx, cardName, trickType, extra }
            var ctx = {
                sourceIdx: payload.sourceIdx,
                targetIdx: payload.targetIdx,
                cardName: payload.cardName,
                trickType: payload.trickType,
                extra: payload.extra || {},
                wuxieParity: 0,      // 0=錦囊生效, 1=被無懈抵消
                asked: {}            // 本輪已表態（跳過/出過無懈）的玩家集合
            };
            advanceWuxieQuery(ctx);
        }

        // 找下一個「有無懈可擊、且本輪尚未表態」的存活玩家來詢問；找不到就結算
        function advanceWuxieQuery(ctx) {
            if (!ctx.asked) ctx.asked = {};   // 本輪已表態（跳過/出過）的玩家集合
            for (var idx = 0; idx < gState.totalPlayers; idx++) {
                if (ctx.asked[idx]) continue;             // 這輪已問過，略過
                var pp = gState.playersData[idx];
                if (!pp.isAlive || !pp.hand) continue;
                var hasWuxie = pp.hand.some(function(c){ return c.displayType === 'wuxie'; });
                if (hasWuxie) {
                    gState.pending = {
                        kind: 'wuxie',
                        responderIdx: idx,
                        sourceIdx: ctx.sourceIdx,
                        targetIdx: ctx.targetIdx,
                        cardName: ctx.cardName,
                        ctx: ctx
                    };
                    return; // 等該玩家回應
                }
            }
            // 沒有人能再出無懈 → 依奇偶決定結算或抵消
            resolveTrickAfterWuxie(ctx);
        }

        // 玩家對「無懈詢問」做出選擇
        function respondWuxie(useIt) {
            var pend = gState.pending;
            if (!pend || pend.kind !== 'wuxie') return;
            if (myPlayerIdx !== pend.responderIdx) return;
            var ctx = pend.ctx;
            if (!ctx.asked) ctx.asked = {};
            var responder = gState.playersData[pend.responderIdx];

            if (useIt) {
                var wIdx = responder.hand.findIndex(function(c){ return c.displayType === 'wuxie'; });
                if (wIdx === -1) {
                    // 沒有無懈可出（理論上不會發生），視同跳過
                    ctx.asked[pend.responderIdx] = true;
                    gState.pending = null;
                    advanceWuxieQuery(ctx);
                    updateCloud();
                    return;
                }
                var wCard = responder.hand.splice(wIdx, 1)[0];
                gState.discardPile.push(wCard);
                recordPlayedCard(wCard, responder.id); // 觸發出牌動畫
                ctx.wuxieParity = (ctx.wuxieParity + 1) % 2;
                gState.gameLogHtml += "<br>🟣 【玩家 " + responder.id + "】 打出了【無懈可擊】！" +
                    (ctx.wuxieParity === 1 ? "（錦囊【" + ctx.cardName + "】被抵消）" : "（抵消了上一張無懈，錦囊恢復生效）");
                // 場上新增一張無懈，重新開放全場表態（任何人可再無懈這張無懈）
                ctx.asked = {};
            } else {
                // 跳過：本輪此人不再被詢問
                ctx.asked[pend.responderIdx] = true;
            }
            gState.pending = null;
            advanceWuxieQuery(ctx);
            updateCloud();
        }

        // 無懈詢問結束後，依 parity 決定錦囊是否生效
        function resolveTrickAfterWuxie(ctx) {
            gState.pending = null;
            if (ctx.wuxieParity === 1) {
                // 被無懈抵消，效果作廢
                gState.gameLogHtml += "<br>🚫 錦囊【" + ctx.cardName + "】最終被【無懈可擊】抵消，未生效。";
                // 延時錦囊（樂不思蜀）被無懈抵消時，牌進棄牌堆
                if (ctx.trickType === 'lebu' && ctx.extra && ctx.extra.card) {
                    if (!gState.discardPile) gState.discardPile = [];
                    gState.discardPile.push(ctx.extra.card);
                }
                postEffectCleanup(ctx.sourceIdx);
                return;
            }
            // 錦囊生效
            if (ctx.trickType === 'wuzhong') {
                drawCardsBackend(ctx.sourceIdx, 2);
                checkWinConditionBackend();
                postEffectCleanup(ctx.sourceIdx);
            }
            else if (ctx.trickType === 'taoyuan') {
                // 桃園結義：所有存活玩家各回 1 血（不超過上限）
                for (var ty = 0; ty < gState.playersData.length; ty++) {
                    var typ = gState.playersData[ty];
                    if (typ && typ.isAlive && typ.hp < (typ.maxHp || 4)) {
                        healPlayerBackend(ty, 1);
                    }
                }
                gState.gameLogHtml += "<br>🍑 【桃園結義】生效，全體存活玩家回復 1 點血量！";
                checkWinConditionBackend();
                postEffectCleanup(ctx.sourceIdx);
            }
            else if (ctx.trickType === 'wugu') {
                // 五穀豐登：所有存活玩家各摸 1 張
                for (var wg = 0; wg < gState.playersData.length; wg++) {
                    var wgp = gState.playersData[wg];
                    if (wgp && wgp.isAlive) {
                        drawCardsBackend(wg, 1);
                    }
                }
                gState.gameLogHtml += "<br>🌾 【五穀豐登】生效，全體存活玩家各摸 1 張牌！";
                checkWinConditionBackend();
                postEffectCleanup(ctx.sourceIdx);
            }
            else if (ctx.trickType === 'nanman' || ctx.trickType === 'wanjian') {
                // 南蠻入侵 / 萬箭齊發：對其他每位玩家逐一要求出牌（殺/閃），否則受傷
                beginAoeResponse(ctx.sourceIdx, ctx.trickType);
            }
            else if (ctx.trickType === 'duel') {
                // 進入決鬥：目標方先出殺
                beginDuel(ctx.sourceIdx, ctx.targetIdx);
            }
            else if (ctx.trickType === 'lebu') {
                // 樂不思蜀：無懈通過後放到目標判定區
                var lbTarget = gState.playersData[ctx.targetIdx];
                if (lbTarget && lbTarget.isAlive && ctx.extra && ctx.extra.card) {
                    if (!lbTarget.judgeZone) lbTarget.judgeZone = [];
                    lbTarget.judgeZone.push(ctx.extra.card);
                    gState.gameLogHtml += "<br>🎭 【樂不思蜀】已置入【玩家 " + lbTarget.id + "】的判定區。";
                } else if (ctx.extra && ctx.extra.card) {
                    gState.discardPile.push(ctx.extra.card); // 目標沒了就棄掉
                }
                postEffectCleanup(ctx.sourceIdx);
            }
            else if (ctx.trickType === 'jiedao') {
                // 借刀殺人生效：問持刀者要不要出殺攻擊被害者
                var wielderIdx = ctx.extra.wielderIdx, victimIdx = ctx.extra.victimIdx;
                var wielder = gState.playersData[wielderIdx];
                // 持刀者武器可能已沒了（中途被拆），或持刀者/被害者已陣亡 → 效果落空
                if (!wielder || !wielder.isAlive || !wielder.equip || !wielder.equip.weapon
                    || !gState.playersData[victimIdx] || !gState.playersData[victimIdx].isAlive) {
                    gState.gameLogHtml += "<br>（借刀殺人效果落空。）";
                    postEffectCleanup(ctx.sourceIdx);
                    return;
                }
                // 持刀者沒有可用的殺 → 直接交武器給發動者
                if (findUsableKillIndex(wielderIdx) === -1) {
                    giveJiedaoWeapon(wielderIdx, ctx.sourceIdx);
                    postEffectCleanup(ctx.sourceIdx);
                    return;
                }
                // 問持刀者：出殺 or 交武器
                gState.pending = {
                    kind: 'jiedao',
                    responderIdx: wielderIdx,
                    sourceIdx: ctx.sourceIdx,
                    targetIdx: victimIdx,
                    cardName: '借刀殺人',
                    ctx: { wielderIdx: wielderIdx, victimIdx: victimIdx }
                };
                updateCloud();
                return;
            }
            else if (ctx.trickType === 'bridge' || ctx.trickType === 'snatch') {
                var targetP = gState.playersData[ctx.targetIdx];
                if (!targetP.hand || targetP.hand.length === 0) {
                    gState.gameLogHtml += "<br>（對方沒有手牌，效果落空。）";
                    postEffectCleanup(ctx.sourceIdx);
                    return;
                }
                // 進入選牌階段，由發動者點選對方一張手牌
                gState.pickCard = {
                    mode: ctx.trickType,
                    sourceIdx: ctx.sourceIdx,
                    targetIdx: ctx.targetIdx
                };
                gState.gameLogHtml += "<br>🔎 請 【玩家 " + gState.playersData[ctx.sourceIdx].id + "】 點選目標的一張手牌。";
            }
        }

        // =====================================================================
        //  群體錦囊逐一回應：南蠻入侵（要殺）/ 萬箭齊發（要閃）
        // =====================================================================
        // 建立待回應佇列（發動者以外的所有存活玩家），逐一處理
        function beginAoeResponse(sourceIdx, trickType) {
            var queue = [];
            for (var i = 0; i < gState.playersData.length; i++) {
                if (i === sourceIdx) continue;
                var pp = gState.playersData[i];
                if (pp && pp.isAlive) queue.push(i);
            }
            if (queue.length === 0) {
                gState.gameLogHtml += "<br>（場上沒有其他目標，效果落空。）";
                postEffectCleanup(sourceIdx);
                return;
            }
            gState.aoeState = {
                trickType: trickType,
                sourceIdx: sourceIdx,
                queue: queue,
                pos: 0
            };
            askNextAoeTarget();
        }

        // 詢問佇列中下一位玩家
        function askNextAoeTarget() {
            var st = gState.aoeState;
            if (!st) return;
            // 佇列處理完畢
            if (st.pos >= st.queue.length) {
                var src = st.sourceIdx;
                gState.aoeState = null;
                checkWinConditionBackend();
                postEffectCleanup(src);
                return;
            }
            var targetIdx = st.queue[st.pos];
            var targetP = gState.playersData[targetIdx];
            // 跳過中途已陣亡者
            if (!targetP || !targetP.isAlive) {
                st.pos++;
                askNextAoeTarget();
                return;
            }
            var needType = (st.trickType === 'nanman') ? 'kill' : 'dodge';
            var needName = (st.trickType === 'nanman') ? '殺' : '閃';
            if (!targetP.hand) targetP.hand = [];
            // 南蠻找可用的殺（含武聖紅牌）、萬箭找可用的閃
            var usableIdx = (needType === 'kill') ? findUsableKillIndex(targetIdx) : findUsableDodgeIndex(targetIdx);
            var hasCard = usableIdx > -1;
            if (!hasCard) {
                // 沒有對應牌可出，直接受傷
                gState.gameLogHtml += "<br>💥 【玩家 " + targetP.id + "】 沒有【" + needName + "】可用，受到 1 點傷害！";
                damagePlayerBackend(targetIdx, 1);
                st.pos++;
                // 受傷可能觸發瀕死求桃；若進入 pending 求桃，等求桃結束會回來
                if (gState.pending && gState.pending.kind === 'peach') {
                    // 求桃流程結束後需要繼續 AOE，標記一下
                    gState.aoeState.resumeAfterPeach = true;
                    return;
                }
                askNextAoeTarget();
                return;
            }
            // 有對應牌，詢問是否出
            gState.pending = {
                kind: 'aoe',
                responderIdx: targetIdx,
                sourceIdx: st.sourceIdx,
                targetIdx: targetIdx,
                needType: needType,
                cardName: needName
            };
        }

        // 玩家對群體錦囊做出回應（出牌抵消 / 不出受傷）
        function respondAoe(useIt) {
            var pend = gState.pending;
            if (!pend || pend.kind !== 'aoe') return;
            if (myPlayerIdx !== pend.responderIdx) return;
            var targetIdx = pend.targetIdx;
            var targetP = gState.playersData[targetIdx];
            var st = gState.aoeState;

            // 南蠻入侵時，若關羽有多於一張「可當殺」的牌，讓他點手牌選要出哪張
            if (useIt && pend.needType === 'kill' && playerHasSkill(targetIdx, 'guanyu')) {
                var usableList = listUsableKillIndices(targetIdx);
                if (usableList.length > 1) {
                    pend.awaitKillPick = true;
                    gState.gameLogHtml += "<br>🗡️ 【玩家 " + targetP.id + "】（武聖）請點選一張手牌作為【殺】。";
                    updateCloud();
                    return;
                }
            }

            gState.pending = null;

            if (useIt) {
                var idx = (pend.needType === 'kill') ? findUsableKillIndex(targetIdx) : findUsableDodgeIndex(targetIdx);
                if (idx > -1) {
                    var usedCard = targetP.hand.splice(idx, 1)[0];
                    gState.discardPile.push(usedCard);
                    recordPlayedCard(usedCard, targetP.id);
                    var asWS = (usedCard.displayType !== pend.needType);
                    gState.gameLogHtml += "<br>🛡️ 【玩家 " + targetP.id + "】 打出【" + pend.cardName + "】" + (asWS ? "（武聖）" : "") + "抵消了傷害。";
                }
            } else {
                gState.gameLogHtml += "<br>💥 【玩家 " + targetP.id + "】 選擇不出【" + pend.cardName + "】，受到 1 點傷害！";
                damagePlayerBackend(targetIdx, 1);
            }
            if (st) {
                st.pos++;
                if (gState.pending && gState.pending.kind === 'peach') {
                    gState.aoeState.resumeAfterPeach = true;
                    updateCloud();
                    return;
                }
                askNextAoeTarget();
            }
            updateCloud();
        }

        // 關羽南蠻時點選一張手牌作為殺（awaitKillPick 模式下，由 selectCard 轉呼叫）
        function pickAoeKillCard(pIdx, cardIdx) {
            var pend = gState.pending;
            if (!pend || pend.kind !== 'aoe' || !pend.awaitKillPick) return false;
            if (myPlayerIdx !== pend.responderIdx) return false;
            var targetIdx = pend.targetIdx;
            if (pIdx !== targetIdx) return false;
            if (!canCardBeKill(targetIdx, cardIdx)) {
                alert("這張牌不能當作【殺】使用，請選擇一張殺，或紅色手牌（武聖）。");
                return true;
            }
            var targetP = gState.playersData[targetIdx];
            var st = gState.aoeState;
            var usedCard = targetP.hand.splice(cardIdx, 1)[0];
            gState.discardPile.push(usedCard);
            recordPlayedCard(usedCard, targetP.id);
            var asWS = (usedCard.displayType !== 'kill');
            gState.gameLogHtml += "<br>🛡️ 【玩家 " + targetP.id + "】 打出【殺】" + (asWS ? "（武聖）" : "") + "抵消了南蠻入侵。";
            gState.pending = null;
            targetP.selectedIndex = -1;
            // 繼續處理 AOE 佇列
            if (st) {
                st.pos++;
                askNextAoeTarget();
            }
            updateCloud();
            return true;
        }

        // =====================================================================
        //  待回應流程：殺 → 等對方出閃
        // =====================================================================
        function askForDodge(sourceIdx, targetIdx, killCard) {
            var targetP = gState.playersData[targetIdx];
            if (!targetP.hand) targetP.hand = [];

            // 【青釭劍】：攻擊方裝青釭劍時，無視對方防具（仁王盾、八卦陣失效）
            var srcP = gState.playersData[sourceIdx];
            var ignoreArmor = srcP && srcP.equip && srcP.equip.weapon === 'qinggang';
            if (ignoreArmor) {
                gState.gameLogHtml += "<br>🗡️ 【青釭劍】發動！無視【玩家 " + targetP.id + "】的防具。";
            }

            // 【仁王盾】：黑色的殺對你無效（直接免疫，不需出閃）
            if (!ignoreArmor && targetP.equip && targetP.equip.armor === 'renwang' && killCard && killCard.colorClass === 'black-suit') {
                gState.gameLogHtml += "<br>🛡️ 【仁王盾】發動！黑色【殺】對【玩家 " + targetP.id + "】無效。";
                postEffectCleanup(sourceIdx);
                return;
            }

            // 【八卦陣】：判定，紅色視為已出閃（自動閃避）
            if (!ignoreArmor && targetP.equip && targetP.equip.armor === 'bagua') {
                var judge = drawJudgeCard();
                var isRed = judge && judge.colorClass === 'red-suit';
                gState.gameLogHtml += "<br>☯️ 【八卦陣】判定：" + (judge ? judge.suit + judge.name : '?') + " → " + (isRed ? "紅色，視為【閃】，成功閃避！" : "黑色，判定失敗。");
                if (isRed) {
                    // 八卦陣判定出的閃，一樣會觸發青龍偃月刀追殺（可連續追殺）
                    if (tryGreenDragonChase(sourceIdx, targetIdx)) { return; }
                    postEffectCleanup(sourceIdx);
                    return;
                }
            }

            // 馬超【鐵騎】：馬超使用殺時，目標需要多出一張閃（共 2 張）才能抵消
            var needDodge = (srcP && playerHasSkill(sourceIdx, 'machao')) ? 2 : 1;
            // 計算目標實際有幾張可用的閃
            var dodgeCount = 0;
            if (targetP.hand) {
                for (var di = 0; di < targetP.hand.length; di++) {
                    if (targetP.hand[di].displayType === 'dodge') dodgeCount++;
                }
            }
            if (dodgeCount < needDodge) {
                // 閃不足，殺命中（寒冰劍可能攔截）
                if (needDodge > 1) {
                    gState.gameLogHtml += "<br>🐎 【鐵騎】【玩家 " + targetP.id + "】 的【閃】不足 " + needDodge + " 張，【殺】命中！";
                } else {
                    gState.gameLogHtml += "<br>💥 【玩家 " + targetP.id + "】 沒有【閃】可用，【殺】命中！";
                }
                resolveKillHit(sourceIdx, targetIdx);
                return;
            }
            gState.pending = {
                kind: 'dodge',
                responderIdx: targetIdx,
                sourceIdx: sourceIdx,
                targetIdx: targetIdx,
                cardName: '殺',
                needDodge: needDodge,   // 需要出幾張閃（鐵騎=2）
                dodgeDone: 0,           // 已出幾張閃
                ctx: {}
            };
        }

        // 判定牌：從牌堆翻一張（用後進棄牌堆），回傳該牌
        function drawJudgeCard() {
            if (!gState.deck) gState.deck = [];
            if (gState.deck.length === 0) {
                if (!gState.discardPile || gState.discardPile.length === 0) return null;
                gState.deck = gState.discardPile.slice();
                gState.discardPile = [];
                for (var k = gState.deck.length - 1; k > 0; k--) {
                    var j = Math.floor(Math.random() * (k + 1));
                    var t = gState.deck[k]; gState.deck[k] = gState.deck[j]; gState.deck[j] = t;
                }
            }
            var jc = gState.deck.pop();
            if (jc) { if (!gState.discardPile) gState.discardPile = []; gState.discardPile.push(jc); }
            return jc;
        }

        // 玩家對「出閃」詢問做選擇
        function respondDodge(useIt) {
            var pend = gState.pending;
            if (!pend || pend.kind !== 'dodge') return;
            if (myPlayerIdx !== pend.responderIdx) return;
            var targetP = gState.playersData[pend.targetIdx];
            var sourceIdx = pend.sourceIdx;
            var targetIdx = pend.targetIdx;

            if (useIt) {
                var dIdx = findUsableDodgeIndex(pend.targetIdx);
                if (dIdx > -1) {
                    var dCard = targetP.hand.splice(dIdx, 1)[0];
                    gState.discardPile.push(dCard);
                    recordPlayedCard(dCard, targetP.id); // 觸發出牌動畫
                    pend.dodgeDone = (pend.dodgeDone || 0) + 1;
                    var need = pend.needDodge || 1;
                    if (pend.dodgeDone < need) {
                        // 鐵騎：還需要再出閃，繼續問（檢查還有沒有閃）
                        if (findUsableDodgeIndex(pend.targetIdx) === -1) {
                            // 沒閃了 → 殺命中
                            gState.gameLogHtml += "<br>🐎 【鐵騎】【玩家 " + targetP.id + "】 出了 " + pend.dodgeDone + " 張【閃】但不足 " + need + " 張，【殺】命中！";
                            gState.pending = null;
                            resolveKillHit(sourceIdx, targetIdx);
                            updateCloud();
                            return;
                        }
                        gState.gameLogHtml += "<br>🛡️ 【玩家 " + targetP.id + "】 打出第 " + pend.dodgeDone + " 張【閃】，【鐵騎】還需再出 " + (need - pend.dodgeDone) + " 張！";
                        updateCloud();
                        return; // pending 保留，繼續等下一張閃
                    }
                    gState.gameLogHtml += "<br>🛡️ 【玩家 " + targetP.id + "】 打出了【閃】，成功抵消【殺】！";
                }
                gState.pending = null;
                // 【貫石斧】：殺被閃後，可棄兩張牌讓此殺強制命中（優先於青龍刀詢問）
                var srcGS = gState.playersData[sourceIdx];
                if (srcGS && srcGS.isAlive && srcGS.equip && srcGS.equip.weapon === 'guanshi'
                    && srcGS.hand && srcGS.hand.length >= 2 && targetP.isAlive) {
                    gState.pending = {
                        kind: 'guanshi',
                        responderIdx: sourceIdx,
                        sourceIdx: sourceIdx,
                        targetIdx: targetIdx,
                        cardName: '貫石斧',
                        ctx: {}
                    };
                    gState.gameLogHtml += "<br>🪓 【貫石斧】：【玩家 " + srcGS.id + "】 可棄兩張牌讓此【殺】強制命中！";
                    updateCloud();
                    return;
                }
                // 【青龍偃月刀】：殺被閃抵消後可追加一張殺，追加的殺被閃還能再追（連續追殺）
                if (tryGreenDragonChase(sourceIdx, targetIdx)) { updateCloud(); return; }
                postEffectCleanup(sourceIdx);
            } else {
                gState.gameLogHtml += "<br>💥 【玩家 " + targetP.id + "】 選擇不閃，【殺】命中！";
                gState.pending = null;          // 先清掉 dodge pending
                resolveKillHit(sourceIdx, targetIdx); // 寒冰劍可能攔截，否則造成傷害
            }
        }

        // 殺命中目標時的結算：寒冰劍可改為棄兩牌不傷害，否則造成 1 點傷害
        function resolveKillHit(sourceIdx, targetIdx) {
            var srcP = gState.playersData[sourceIdx];
            var tgtP = gState.playersData[targetIdx];
            // 【寒冰劍】：攻擊方有寒冰劍、且對方有手牌 → 詢問攻擊方要傷害還是棄兩牌
            if (srcP && srcP.equip && srcP.equip.weapon === 'hanbing'
                && tgtP && tgtP.isAlive && tgtP.hand && tgtP.hand.length > 0) {
                gState.pending = {
                    kind: 'hanbing',
                    responderIdx: sourceIdx,
                    sourceIdx: sourceIdx,
                    targetIdx: targetIdx,
                    cardName: '寒冰劍',
                    ctx: {}
                };
                gState.gameLogHtml += "<br>❄️ 【寒冰劍】：【玩家 " + srcP.id + "】 可改為棄掉對方兩張牌（不造成傷害）。";
                updateCloud();
                return;
            }
            // 一般情況：造成 1 點傷害
            damagePlayerBackend(targetIdx, 1);
            checkWinConditionBackend();
            if (gState.pending && gState.pending.kind === 'peach') { return; }
            postEffectCleanup(sourceIdx);
        }

        // 青龍偃月刀追殺：出殺者決定是否追加一張殺

        // 青龍刀追殺點牌（關羽武聖多張可選時）
        function pickGreenDragonKillCard(pIdx, cardIdx) {

        // =====================================================================

        // whoseTurnIdx：目前該誰出殺
        function askDuelKill(sourceIdx, targetIdx, whoseTurnIdx) {
            var actor = gState.playersData[whoseTurnIdx];
            if (!actor.hand) actor.hand = [];
            var hasKill = findUsableKillIndex(whoseTurnIdx) > -1; // 含關羽武聖紅牌當殺

            gState.pending = {

        function respondDuel(useIt) {

                var usableList = listUsableKillIndices(whoseTurnIdx);

        // 效果結算完成後的統一收尾（檢查發動方是否陣亡需交棒）
        function postEffectCleanup(sourceIdx) {
            if (gState.isGameOver) { updateCloud(); return; }
            // 若有人處於瀕死（索桃進行中），優先處理
            if (gState.pending && gState.pending.kind === 'peach') { updateCloud(); return; }

            if (gState.aoeState && gState.aoeState.resumeAfterPeach) {

        // =====================================================================

        // =====================================================================
        function pickTargetCard(ownerIdx, cardIdx) {

        // =====================================================================

        // =====================================================================

        function startPeachQuery(dyingIdx, resumeSourceIdx) {
            advancePeachQuery({ dyingIdx: dyingIdx, resumeSourceIdx: resumeSourceIdx, declined: {} });
        }

        function advancePeachQuery(ctx) {
            var dying = gState.playersData[ctx.dyingIdx];
            // 已脫離瀕死
            if (dying.hp > 0) {
                gState.pending = null;
                finishDying(ctx);
                return;
            }
            if (!ctx.declined) ctx.declined = {}; // 本輪已表態「不出桃」的玩家集合
            // 從瀕死者開始繞一圈，找「有桃、且本輪尚未拒絕」的存活玩家
            for (var step = 0; step < gState.totalPlayers; step++) {
                var idx = (ctx.dyingIdx + step) % gState.totalPlayers;
                if (ctx.declined[idx]) continue;          // 這輪已拒絕，略過
                var pp = gState.playersData[idx];
                if (!pp.isAlive || !pp.hand) continue;
                // 真桃誰都能出；華佗用紅牌當桃僅限「救自己」（idx===瀕死者）
                var hasPeach;
                if (idx === ctx.dyingIdx) {
                    hasPeach = findUsablePeachIndex(idx) > -1; // 含華佗紅牌自救
                } else {
                    hasPeach = pp.hand.some(function(c){ return c.displayType === 'peach'; });
                }
                if (hasPeach) {
                    gState.pending = {
                        kind: 'peach',
                        responderIdx: idx,
                        sourceIdx: ctx.resumeSourceIdx,
                        targetIdx: ctx.dyingIdx,
                        cardName: '桃',
                        ctx: ctx
                    };
                    return;
                }
            }

            gState.pending = null;
            finishDying(ctx);

            if (myPlayerIdx !== pend.responderIdx) return;
            var ctx = pend.ctx;
            if (!ctx.declined) ctx.declined = {};
            var responder = gState.playersData[pend.responderIdx];
            var dying = gState.playersData[ctx.dyingIdx];

            if (useIt) {
                // 救自己時華佗可用紅牌；救別人只能用真桃
                var peachIdx;
                if (pend.responderIdx === ctx.dyingIdx) {
                    peachIdx = findUsablePeachIndex(pend.responderIdx); // 含華佗紅牌自救
                } else {
                    peachIdx = responder.hand.findIndex(function(c){ return c.displayType === 'peach'; });
                }
                if (peachIdx > -1) {
                    var peachCard = responder.hand.splice(peachIdx, 1)[0];
                    gState.discardPile.push(peachCard);
                    recordPlayedCard(peachCard, responder.id); // 觸發出牌動畫

                    gState.gameLogHtml += "<br>💖 【玩家 " + responder.id + "】 打出【桃】" + (asHuatuo ? "（急救）" : "") + "，【玩家 " + dying.id + "】血量回升至 " + dying.hp + "。";
                }
                // 出桃後局勢改變（血量上升），清空拒絕集合重新評估
                // （已脫離瀕死則 advancePeachQuery 會直接結束）
                ctx.declined = {};
                gState.pending = null;
                advancePeachQuery(ctx);
                updateCloud();
            } else {
                // 跳過：本輪此人不再被詢問
                ctx.declined[pend.responderIdx] = true;
                gState.pending = null;
                advancePeachQuery(ctx);
                updateCloud();
            }
        }

        // 索桃結束：仍 <=0 則陣亡
        function finishDying(ctx) {
            var dying = gState.playersData[ctx.dyingIdx];
            if (dying.hp <= 0) {
                dying.isAlive = false; dying.hand = [];
                gState.gameLogHtml += "<br>💀 【玩家 " + dying.id + "】 體力耗盡，宣告陣亡！！";
                // 記錄陣亡事件，讓所有視窗同步播放陣亡動畫
                gState.lastDeath = { playerIdx: ctx.dyingIdx, playerId: dying.id, ts: Date.now() };
            }
            checkWinConditionBackend();
            postEffectCleanup(ctx.resumeSourceIdx);
        }

        function damagePlayerBackend(pIdx, points) {
            var p = gState.playersData[pIdx];
            p.hp -= points;
            // 記錄受傷事件，讓所有視窗同步播放受傷動畫
            gState.lastDamage = { playerIdx: pIdx, points: points, ts: Date.now() };
            if (p.hp <= 0) {
                gState.gameLogHtml += "<br>🚨 【玩家 " + p.id + "】 進入【瀕死狀態】！需要【桃】救援...";
                // 啟動手動求桃流程（resumeSourceIdx 用當前回合方，索桃結束後回到該方收尾）
                startPeachQuery(pIdx, gState.currentPlayerIdx);
            } else {
                // 曹操【奸雄】：受到傷害後（未瀕死）摸一張牌
                if (playerHasSkill(pIdx, 'caocao')) {
                    drawCardsBackend(pIdx, points); // 受到幾點傷害就摸幾張
                    gState.gameLogHtml += "<br>🗡️ 【奸雄】發動！【玩家 " + p.id + "】 受傷後摸了 " + points + " 張牌。";
                }
            }
        }

        // 補血並記錄治療事件（給所有視窗同步播放治療動畫）
        function healPlayerBackend(pIdx, points) {
            var p = gState.playersData[pIdx];
            if (!p) return;
            p.hp += points;
            gState.lastHeal = { playerIdx: pIdx, points: points, ts: Date.now() };
        }

        function confirmDiscard(pIdx) {
            if (!gState.isDiscardStage || gState.isGameOver || gState.currentPlayerIdx !== pIdx) return;
            if (myPlayerIdx !== pIdx) return; // 只有當事人視窗能確認
            if (!gState.selectedDiscardIndices) gState.selectedDiscardIndices = [];
            if (!gState.discardPile) gState.discardPile = []; // 安全檢查：雲端舊資料可能缺此欄位

            var p = gState.playersData[pIdx];
            if (!p.hand) p.hand = [];

            // 防護：去重 + 過濾無效索引（避免雲端延遲造成索引與手牌不同步而錯刪/少刪）
            var validSet = {};
            var validIdx = [];
            for (var s = 0; s < gState.selectedDiscardIndices.length; s++) {
                var ix = gState.selectedDiscardIndices[s];
                if (typeof ix === 'number' && ix >= 0 && ix < p.hand.length && !validSet[ix]) {
                    validSet[ix] = true;
                    validIdx.push(ix);
                }
            }
            // 數量必須剛好等於需求，否則不放行（並把選擇修正為有效集合）
            if (validIdx.length !== gState.requiredDiscardCount) {
                gState.selectedDiscardIndices = validIdx;
                updateCloud();
                return;
            }

            // 由大到小排序後 splice，從後往前刪不會造成索引位移
            validIdx.sort(function(a, b){ return b - a; });
            for (var i = 0; i < validIdx.length; i++) {
                var discarded = p.hand.splice(validIdx[i], 1)[0];
                if (discarded) gState.discardPile.push(discarded);
            }
            gState.gameLogHtml += "<br>🗑️ 【玩家 " + p.id + "】 完成了棄牌。";
            gState.isDiscardStage = false;
            gState.requiredDiscardCount = 0;
            gState.selectedDiscardIndices = [];
            p.selectedIndex = -1;
            executeTurnSwitchBackend();
        }

        function endTurn(pIdx) {
            if (gState.isGameOver || gState.currentPlayerIdx !== pIdx || myPlayerIdx !== pIdx || gState.isDiscardStage) return;
            if (gState.pending != null || gState.pickCard != null) return;
            var p = gState.playersData[pIdx];
            if (!p.hand) p.hand = [];
            if (p.hand.length > p.hp) {
                gState.isDiscardStage = true;
                gState.requiredDiscardCount = p.hand.length - p.hp;
                gState.selectedDiscardIndices = [];
                p.selectedIndex = -1;
                cancelTargetSelection();
                gState.gameLogHtml += "<br>⏳ 【玩家 " + p.id + "】手牌溢出，進入棄牌階段。";
                updateCloud();
            } else {
                executeTurnSwitchBackend();
            }
        }

        function executeTurnSwitchBackend() {
            gState.hasUsedKillThisTurn = false;
            gState.skipPlayStage = false; // 先清掉上一回合的樂不思蜀狀態
            cancelTargetSelection();
            
            var aliveCount = 0;
            for (var i = 0; i < gState.totalPlayers; i++) {
                if (gState.playersData[i].isAlive) aliveCount++;
            }
            if (aliveCount <= 1) { checkWinConditionBackend(); updateCloud(); return; }

            var nextIdx = gState.currentPlayerIdx;
            while (true) {
                nextIdx = (nextIdx + 1) % gState.totalPlayers;
                if (gState.playersData[nextIdx].isAlive) {
                    gState.currentPlayerIdx = nextIdx;
                    break;
                }
            }
            gState.gameLogHtml += "<br>--------------------------------------------------<br>📣 輪到 【 玩家 " + gState.playersData[gState.currentPlayerIdx].id + " 】 的大回合開始！";
            for(var i=0; i<gState.totalPlayers; i++) gState.playersData[i].selectedIndex = -1;
            // 回合開始先處理判定區（樂不思蜀、閃電）。若樂不思蜀生效則跳過出牌（但仍摸牌）。
            var skipPlay = processJudgeZone(gState.currentPlayerIdx);
            if (gState.isGameOver) { updateCloud(); return; } // 閃電可能劈死人
            drawCardsBackend(gState.currentPlayerIdx, 2);
            gState.skipPlayStage = skipPlay; // 樂不思蜀：本回合跳過出牌階段
            updateCloud();
        }

        // 處理某玩家回合開始的判定區（依序判定每張延時錦囊）
        // 回傳 true 表示樂不思蜀生效需跳過出牌階段
        function processJudgeZone(pIdx) {
            var p = gState.playersData[pIdx];
            if (!p || !p.judgeZone || p.judgeZone.length === 0) return false;
            var skipPlay = false;
            // 複製一份來處理（過程中會清空原判定區）
            var zone = p.judgeZone.slice();
            p.judgeZone = [];
            for (var z = 0; z < zone.length; z++) {
                var delayCard = zone[z];
                if (delayCard.displayType === 'lebu') {
                    var judge = drawJudgeCard();
                    var isHeart = judge && judge.suit === '♥';
                    gState.gameLogHtml += "<br>🎭 【樂不思蜀】判定：" + (judge ? judge.suit + judge.name : '?') + " → " + (isHeart ? "紅桃，解除！正常出牌。" : "非紅桃，本回合跳過出牌階段！");
                    if (!isHeart) skipPlay = true;
                    if (!gState.discardPile) gState.discardPile = [];
                    gState.discardPile.push(delayCard); // 判定後樂不思蜀進棄牌堆
                }
                else if (delayCard.displayType === 'shandian') {
                    var judge2 = drawJudgeCard();
                    // 閃電：♠2~9 → 受 3 點雷傷；否則移到下家判定區
                    var isHit = judge2 && judge2.suit === '♠' && isSpadeInRange(judge2.name);
                    gState.gameLogHtml += "<br>⚡ 【閃電】判定：" + (judge2 ? judge2.suit + judge2.name : '?') + " → " + (isHit ? "♠2~9，遭雷劈受 3 點傷害！" : "未中，移交下家。");
                    if (isHit) {
                        if (!gState.discardPile) gState.discardPile = [];
                        gState.discardPile.push(delayCard); // 劈中後閃電進棄牌堆
                        damagePlayerBackend(pIdx, 3);
                        checkWinConditionBackend();
                    } else {
                        // 移到下一個存活玩家的判定區
                        var nx = pIdx;
                        do { nx = (nx + 1) % gState.totalPlayers; } while (!gState.playersData[nx].isAlive && nx !== pIdx);
                        if (!gState.playersData[nx].judgeZone) gState.playersData[nx].judgeZone = [];
                        gState.playersData[nx].judgeZone.push(delayCard);
                    }
                }
            }
            return skipPlay;
        }

        // 閃電判定：♠2~9 才中（A、10、J、Q、K 不中）
        function isSpadeInRange(name) {
            var n = name;
            if (n === 'A' || n === '10' || n === 'J' || n === 'Q' || n === 'K') return false;
            var num = parseInt(n, 10);
            return num >= 2 && num <= 9;
        }

        function checkWinConditionBackend() {
            var aliveCount = 0; var winnerP = null; var winnerIdx = -1;
            for (var i = 0; i < gState.totalPlayers; i++) {
                if (gState.playersData[i].isAlive) { aliveCount++; winnerP = gState.playersData[i]; winnerIdx = i; }
            }
            if (aliveCount === 1 && winnerP) {
                gState.gameLogHtml += "<br>🏆 🎉 遊戲結束！【玩家 " + winnerP.id + "】 成功奪得天下！";
                gState.isGameOver = true;
                // 記錄勝者資訊，讓所有視窗同步跳出勝利畫面
                gState.winnerInfo = { playerIdx: winnerIdx, playerId: winnerP.id, ts: Date.now() };
            }
        }

                var aoeName = (pend.needType === 'kill') ? '南蠻入侵' : '萬箭齊發';
                html = "🎴 你受到【" + aoeName + "】影響！是否打出【" + pend.cardName + "】？";
                yes = "🛡️ 出【" + pend.cardName + "】"; no = "💥 不出（受 1 傷害）";
                html += panelBtns("respondAoe");
            }
            // 填入按鈕文字
            panel.innerHTML = html.replace("__YES__", yes).replace("__NO__", no);
        }

        function panelBtns(fnName) {
            return '<div style="margin-top:10px;">' +
                '<button style="background-color:#4caf50; box-shadow:0 2px #2e7d32;" onclick="' + fnName + '(true)">__YES__</button>' +
                '<button style="background-color:#9e9e9e; box-shadow:0 2px #616161;" onclick="' + fnName + '(false)">__NO__</button>' +
                '</div>';
        }

        // 核心同步渲染畫面
        function syncRenderUI() {
            // 更新日誌
            var logBox = document.getElementById('game-log');
            logBox.innerHTML = gState.gameLogHtml || "等待開局...";
            logBox.scrollTop = logBox.scrollHeight;

            // 比對日誌新增內容，自動播放對應音效（所有連線視窗皆會觸發）
            detectAndPlaySounds(gState.gameLogHtml || "");

            // 偵測「最近一次出牌」是否更新，若有就播放出牌動畫
            if (gState.lastPlayedCard && gState.lastPlayedCard.ts && gState.lastPlayedCard.ts > lastPlayedCardTs) {
                lastPlayedCardTs = gState.lastPlayedCard.ts;
                showPlayedCardEffect(gState.lastPlayedCard);
            }

            // 偵測「最近一次受傷」是否更新，若有就播放受傷震動閃紅動畫
            if (gState.lastDamage && gState.lastDamage.ts && gState.lastDamage.ts > lastDamageTs) {
                lastDamageTs = gState.lastDamage.ts;
                triggerDamageEffect(gState.lastDamage.playerIdx);
            }

            // 偵測「最近一次治療」是否更新，若有就播放治療綠光與愛心動畫
            if (gState.lastHeal && gState.lastHeal.ts && gState.lastHeal.ts > lastHealTs) {
                lastHealTs = gState.lastHeal.ts;
                triggerHealEffect(gState.lastHeal.playerIdx);
            }

            // 偵測陣亡，播放陣亡動畫（所有視窗同步）
            if (gState.lastDeath && gState.lastDeath.ts && gState.lastDeath.ts > lastDeathTs) {
                lastDeathTs = gState.lastDeath.ts;
                triggerDeathEffect(gState.lastDeath.playerIdx);
            }

            // 偵測勝利，跳出勝利彈窗（所有視窗同步）
            if (gState.winnerInfo && gState.winnerInfo.ts && gState.winnerInfo.ts > lastWinnerTs) {
                lastWinnerTs = gState.winnerInfo.ts;
                showVictoryOverlay(gState.winnerInfo);
            }

            refreshIdentityLock();
            renderResponsePanel();

            var dCount = gState.deck ? gState.deck.length : 0;
            var discCount = gState.discardPile ? gState.discardPile.length : 0;
            document.getElementById('deck-count').innerText = "🔮 雲端剩餘牌數：" + dCount + " 張 | 已棄牌數：" + discCount + " 張";

            var wrapper = document.getElementById('players-wrapper');
            wrapper.innerHTML = ""; // 重洗

            // 以實際玩家資料長度為準（避免 totalPlayers 與 playersData 不同步時讀到 undefined）
            var pdata = Array.isArray(gState.playersData) ? gState.playersData : [];
            var renderCount = Math.min(gState.totalPlayers || pdata.length, pdata.length);

            for (var i = 0; i < renderCount; i++) {
                var p = gState.playersData[i];
                if (!p) continue; // 防呆：資料未就緒則跳過此格
                var colorStyle = getPlayerThemeColor(i);
                if(!p.hand) p.hand = [];

                // 建立 HTML 元素
                var pBox = document.createElement('div');
                pBox.id = "pbox-" + i;
                pBox.className = "box-player";
                // 若這個玩家剛受傷且動畫還沒結束（750ms 內），帶上 damaged class 維持動畫
                if (gState.lastDamage && gState.lastDamage.playerIdx === i && gState.lastDamage.ts
                    && (Date.now() - gState.lastDamage.ts) < 750) {
                    pBox.className += " damaged";
                }
                // 若這個玩家剛被治療且動畫還沒結束（1050ms 內），帶上 healed class 維持動畫
                if (gState.lastHeal && gState.lastHeal.playerIdx === i && gState.lastHeal.ts
                    && (Date.now() - gState.lastHeal.ts) < 1050) {
                    pBox.className += " healed";
                }
                pBox.setAttribute("onclick", "handlePlayerBlockClick(" + i + ")");

                var deadStr = p.isAlive ? "" : " <span style='color:red;'>[陣亡]</span>";
                var maxHp = (typeof p.maxHp === 'number' && p.maxHp > 0) ? p.maxHp : 4;
                var emptyHearts = Math.max(0, maxHp - p.hp);
                var hpStr = p.hp <= 0 ? "💀 瀕死結算中" : "💖".repeat(Math.max(0, p.hp)) + "🖤".repeat(emptyHearts);

                // 玩家名字（若已設定）顯示在玩家編號下方
                var pname = (gState.playerNames && gState.playerNames[i]) ? String(gState.playerNames[i]).slice(0, 6) : "";
                var nameHtml = pname
                    ? '<div style="font-size:16px; color:#ffd700; font-weight:bold; margin-top:-4px; margin-bottom:4px; text-shadow:0 1px 2px rgba(0,0,0,0.6);">「' + escapeHtml(pname) + '」</div>'
                    : '';

                // 武將顯示（名字 + 技能名 + 技能說明按鈕）
                var genHtml = '';
                var genObj = p.general ? getGeneralByKey(p.general) : null;
                if (genObj) {
                    var kingdomColor = { '蜀':'#43a047', '魏':'#1e88e5', '吳':'#e53935', '群':'#8e24aa' }[genObj.kingdom] || '#888';
                    // 技能名改用青綠色膠囊底，與金色玩家名明顯區隔
                    genHtml = '<div style="margin:2px 0 6px 0; display:flex; align-items:center; flex-wrap:wrap; gap:5px;">' +
                        '<span style="background:' + kingdomColor + '; color:#fff; font-size:13px; font-weight:bold; padding:2px 8px; border-radius:10px;">' + genObj.kingdom + '｜' + escapeHtml(genObj.name) + '</span>' +
                        '<span style="background:#0d3b34; color:#4ddbc4; font-size:13px; font-weight:bold; padding:2px 8px; border-radius:10px; border:1px solid #1e7a6c;">【' + escapeHtml(genObj.skill) + '】</span>' +
                        '<span onclick="event.stopPropagation(); showSkillInfo(\'' + genObj.key + '\')" style="cursor:pointer; background:#444; color:#fff; font-size:12px; font-weight:bold; width:18px; height:18px; line-height:18px; text-align:center; border-radius:50%; display:inline-block;" title="查看技能說明">?</span>' +
                        '</div>';
                }

                // 裝備區顯示（武器格 + 防具格）
                var equipHtml = '';
                if (p.equip && (p.equip.weapon || p.equip.armor)) {
                    var parts = [];
                    if (p.equip.weapon) {
                        var wd = getEquipDef(p.equip.weapon);
                        if (wd) {
                            // 丈八蛇矛：自己回合可點擊發動技能
                            var canClickZhangba = (p.equip.weapon === 'zhangba' && i === myPlayerIdx && i === gState.currentPlayerIdx && !gState.isDiscardStage);
                            if (canClickZhangba) {
                                parts.push('<span onclick="event.stopPropagation(); activateZhangba(' + i + ');" style="background:#6d4c41; color:#ffd54f; font-size:12px; padding:2px 7px; border-radius:8px; cursor:pointer; border:1px solid #ffd54f;" title="點擊發動：' + escapeHtml(wd.desc) + '">⚔️ ' + escapeHtml(wd.name) + ' 👆</span>');
                            } else {
                                parts.push('<span style="background:#6d4c41; color:#ffd54f; font-size:12px; padding:2px 7px; border-radius:8px;" title="' + escapeHtml(wd.desc) + '">⚔️ ' + escapeHtml(wd.name) + '</span>');
                            }
                        }
                    }
                    if (p.equip.armor) {
                        var ad = getEquipDef(p.equip.armor);
                        if (ad) parts.push('<span style="background:#37474f; color:#80deea; font-size:12px; padding:2px 7px; border-radius:8px;" title="' + escapeHtml(ad.desc) + '">🛡️ ' + escapeHtml(ad.name) + '</span>');
                    }
                    equipHtml = '<div style="margin:2px 0 6px 0; display:flex; gap:5px; flex-wrap:wrap;">' + parts.join('') + '</div>';
                }

                // 判定區顯示（延時錦囊：樂不思蜀、閃電）
                var judgeHtml = '';
                if (p.judgeZone && p.judgeZone.length > 0) {
                    var jparts = [];
                    for (var jz = 0; jz < p.judgeZone.length; jz++) {
                        var jc = p.judgeZone[jz];
                        var jName = getCardNameChinese(jc.displayType);
                        var jIcon = jc.displayType === 'shandian' ? '⚡' : '🎭';
                        jparts.push('<span style="background:#4a148c; color:#e1bee7; font-size:12px; padding:2px 7px; border-radius:8px;">' + jIcon + ' ' + escapeHtml(jName) + '</span>');
                    }
                    judgeHtml = '<div style="margin:2px 0 6px 0; display:flex; gap:5px; flex-wrap:wrap;">' + jparts.join('') + '</div>';
                }

                var innerHtml = '<div style="text-align: left; font-weight: bold; color: ' + colorStyle + '; font-size: 22px;">👤 玩家 ' + p.id + deadStr + '</div>' +
                                nameHtml +
                                genHtml +
                                equipHtml +
                                judgeHtml +
                                '<div class="hp-display">' + hpStr + ' (' + p.hp + '/' + maxHp + ')</div>' +
                                '<div id="pcards-' + i + '" class="cards-area" onclick="event.stopPropagation();"></div>' + 
                                '<div id="pcardinfo-' + i + '" style="min-height:0; font-size:13px; color:#b2dfdb; margin:4px 2px; line-height:1.4;"></div>' +
                                '<div>' +
                                    '<button id="pbtn-play-' + i + '" class="btn-action" style="background-color:'+colorStyle+';" onclick="event.stopPropagation(); useCard(' + i + ')">使用卡牌</button>' +
                                    '<button id="pbtn-end-' + i + '" class="btn-end" onclick="event.stopPropagation(); endTurn(' + i + ')">結束回合</button>' +
                                '</div>';
                pBox.innerHTML = innerHtml;
                wrapper.appendChild(pBox);

                var pCardsEl = document.getElementById('pcards-' + i);
                var btnPlay = document.getElementById('pbtn-play-' + i);
                var btnEnd = document.getElementById('pbtn-end-' + i);

                if (!p.isAlive) {
                    // 若正在陣亡動畫期間（1.4 秒內），保留動畫不要立刻變暗
                    var inDeathAnim = gState.lastDeath && gState.lastDeath.playerIdx === i && gState.lastDeath.ts
                        && (Date.now() - gState.lastDeath.ts) < 1400;
                    if (inDeathAnim) {
                        pCardsEl.innerHTML = '已陣亡';
                        btnPlay.disabled = true; btnEnd.disabled = true;
                        pBox.classList.add('death-anim');
                        // 重新掛上骷髏（重渲染會清掉舊的）
                        var sk = document.createElement('div');
                        sk.className = 'death-skull';
                        sk.textContent = '💀';
                        pBox.appendChild(sk);
                        setTimeout((function(b){ return function(){ if(b){ b.style.opacity='0.2'; } }; })(pBox), 1400 - (Date.now() - gState.lastDeath.ts));
                        continue;
                    }
                    pBox.style.opacity = "0.2"; pCardsEl.innerHTML = '已陣亡';
                    btnPlay.disabled = true; btnEnd.disabled = true;
                    continue;
                }

                // 👁️ 戰爭迷霧判定（已移除旁觀者天眼）：
                // 玩家只能看見跟自己 myPlayerIdx 相符的手牌，別人的都顯示為牌背。
                // 未選擇身份(-2)者一律看牌背，杜絕開頁面即偷看。
                var canSeeThisHand = (myPlayerIdx === i);

                // 選牌階段：發動者要能點「目標」的手牌（即使看不到內容）
                var isPickingFromThis = gState.pickCard
                    && gState.pickCard.targetIdx === i
                    && gState.pickCard.sourceIdx === myPlayerIdx;

                var cardsHtml = "";
                for (var j = 0; j < p.hand.length; j++) {
                    if (canSeeThisHand) {
                        var cls = ' card';
                        if (gState.isDiscardStage && gState.currentPlayerIdx === i) {
                            if (gState.selectedDiscardIndices && gState.selectedDiscardIndices.includes(j)) cls += ' discard-selected';
                        } else {
                            if (p.selectedIndex === j) cls += ' selected';
                        }
                        var clickHandler = isPickingFromThis
                            ? 'pickTargetCard(' + i + ', ' + j + ')'
                            : 'selectCard(' + i + ', ' + j + ')';
                        if (isPickingFromThis) cls += ' selectable-pick';
                        cardsHtml += '<div class="' + cls + '" title="' + escapeHtml(getCardTooltip(p.hand[j])) + '" onclick="' + clickHandler + '">' + getCardContentHtml(p.hand[j]) + '</div>';
                    } else if (isPickingFromThis) {
                        // 看不到內容但要能選（拆橋/順手對盲牌）
                        cardsHtml += '<div class="card card-back selectable-pick" onclick="pickTargetCard(' + i + ', ' + j + ')"><span>🃏</span><span style="font-size:11px; margin-top:5px; color:#aaa;">點此選取</span></div>';
                    } else {
                        cardsHtml += '<div class="card card-back"><span>🃏</span><span style="font-size:11px; margin-top:5px; color:#aaa;">手牌</span></div>';
                    }
                }
                pCardsEl.innerHTML = cardsHtml || '<span style="color:#666;">無手牌</span>';

                // 牌說明區：選了某張牌時顯示其功能（手機友善，取代 hover）
                var pCardInfoEl = document.getElementById('pcardinfo-' + i);
                if (pCardInfoEl) {
                    if (canSeeThisHand && p.selectedIndex >= 0 && p.selectedIndex < p.hand.length) {
                        var selCard = p.hand[p.selectedIndex];
                        pCardInfoEl.innerHTML = '💡 ' + escapeHtml(getCardTooltip(selCard));
                    } else {
                        pCardInfoEl.innerHTML = '';
                    }
                }

                // 全域鎖：有待回應 / 選牌進行中，所有人的一般操作按鈕都停用
                var globalLock = (gState.pending != null) || (gState.pickCard != null);

                // 按鈕控制與提示行
                if (globalLock) {
                    btnPlay.disabled = true;
                    btnEnd.disabled = true;
                    if (gState.currentPlayerIdx === i) {
                        pBox.style.opacity = "1";
                        pBox.style.borderColor = colorStyle;
                        pBox.style.boxShadow = "0 0 15px " + colorStyle;
                    } else {
                        pBox.style.opacity = "0.5";
                    }
                    document.getElementById('turn-prompt').innerText = "⏸️ 結算中，請依下方面板回應…";
                } else if (gState.isSelectingTarget) {
                    if (gState.currentPlayerIdx === i) {
                        if (myPlayerIdx === i) {
                            document.getElementById('turn-prompt').innerText = "🎯 [你行動中] 請點擊敵方玩家發動【" + gState.targetSelectCardName + "】";
                        }
                        pBox.style.boxShadow = "0 0 12px " + colorStyle;
                    } else {
                        pBox.classList.add('selectable-target');
                    }
                    btnPlay.disabled = true; btnEnd.disabled = true;
                } else {
                    if (gState.currentPlayerIdx === i) {
                        pBox.style.opacity = "1";
                        pBox.style.borderColor = colorStyle;
                        pBox.style.boxShadow = "0 0 15px " + colorStyle;

                        if (gState.isDiscardStage) {
                            document.getElementById('turn-prompt').innerText = "⚠️ 【 玩家 " + p.id + " 】手牌溢出，請點選卡牌棄置";
                            // 只計算「在目前手牌範圍內、不重複」的有效選擇，避免延遲殘留造成計數錯誤
                            var seenSel = {}, validSelCount = 0;
                            var selArr = gState.selectedDiscardIndices || [];
                            for (var sIdx = 0; sIdx < selArr.length; sIdx++) {
                                var sv = selArr[sIdx];
                                if (typeof sv === 'number' && sv >= 0 && sv < p.hand.length && !seenSel[sv]) {
                                    seenSel[sv] = true; validSelCount++;
                                }
                            }
                            btnPlay.innerText = "確認棄牌 (" + validSelCount + " / " + gState.requiredDiscardCount + ")";
                            btnPlay.setAttribute("onclick", "event.stopPropagation(); confirmDiscard(" + i + ")");
                            btnPlay.disabled = (validSelCount !== gState.requiredDiscardCount || myPlayerIdx !== i);
                            btnEnd.disabled = true;
                        } else {
                            document.getElementById('turn-prompt').innerText = "👉 目前回合行動方：【 玩家 " + p.id + " 】";
                            btnPlay.disabled = (myPlayerIdx !== i);
                            btnEnd.disabled = (myPlayerIdx !== i);
                        }
                    } else {
                        pBox.style.opacity = "0.4";
                        btnPlay.disabled = true; btnEnd.disabled = true;
                    }
                }
            }

            // 尚未選擇身份且戰局進行中：提醒先選身份（此時看到的全是牌背）
            if (myPlayerIdx === -2 && isGameRunning() && !gState.isGameOver) {
                document.getElementById('turn-prompt').innerText = "🔒 請先於右上角選擇你的身份才能查看手牌與行動";
                document.getElementById('turn-prompt').style.color = "#ff9800";
            }

            if (gState.isGameOver) {
                document.getElementById('turn-prompt').innerText = "🏁 戰局宣告結束！";
                document.getElementById('turn-prompt').style.color = "#d61c1c";
            }
        }

        // 開局載入監聽
        initRoomSync();
        startHeartbeat();

        // 視窗關閉/重整前，主動釋放本視窗占用的座位（讓座位立即釋出，不用等心跳逾時）
        window.addEventListener('beforeunload', function() {
            try {
                if (myPlayerIdx >= 0 && gState && gState.claimedSeats &&
                    gState.claimedSeats[myPlayerIdx] === myClientId &&
                    !isGameRunning()) {
                    // 僅在「尚未開局」時主動讓位；對戰進行中不釋放，避免誤清正在玩的人
                    releaseMySeat();
                    updateCloud();
                }
            } catch (e) {}
        });
    </script>
</body>
</html>
