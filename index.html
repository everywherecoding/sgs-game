                postEffectCleanup(sourceIdx);
                return;
            }
            gState.aoeState = {
                trickType: trickType,
                sourceIdx: sourceIdx,
                queue: queue,
                pos: 0
            };
            askNextAoeTarget();
        }

        // 詢問佇列中下一位玩家
        function askNextAoeTarget() {
            var st = gState.aoeState;
            if (!st) return;
            // 佇列處理完畢
            if (st.pos >= st.queue.length) {
                var src = st.sourceIdx;
                gState.aoeState = null;
                checkWinConditionBackend();
                postEffectCleanup(src);
                return;
            }
            var targetIdx = st.queue[st.pos];
            var targetP = gState.playersData[targetIdx];
            // 跳過中途已陣亡者
            if (!targetP || !targetP.isAlive) {
                st.pos++;
                askNextAoeTarget();
                return;
            }
            var needType = (st.trickType === 'nanman') ? 'kill' : 'dodge';
            var needName = (st.trickType === 'nanman') ? '殺' : '閃';
            if (!targetP.hand) targetP.hand = [];
            var hasCard = targetP.hand.some(function(c){ return c.displayType === needType; });
            if (!hasCard) {
                // 沒有對應牌可出，直接受傷
                gState.gameLogHtml += "<br>💥 【玩家 " + targetP.id + "】 沒有【" + needName + "】可用，受到 1 點傷害！";
                damagePlayerBackend(targetIdx, 1);
                st.pos++;
                // 受傷可能觸發瀕死求桃；若進入 pending 求桃，等求桃結束會回來
                if (gState.pending && gState.pending.kind === 'peach') {
                    // 求桃流程結束後需要繼續 AOE，標記一下
                    gState.aoeState.resumeAfterPeach = true;
                    return;
                }
                askNextAoeTarget();
                return;
            }
            // 有對應牌，詢問是否出
            gState.pending = {
                kind: 'aoe',
                responderIdx: targetIdx,
                sourceIdx: st.sourceIdx,
                targetIdx: targetIdx,
                needType: needType,
                cardName: needName
            };
        }

        // 玩家對群體錦囊做出回應（出牌抵消 / 不出受傷）
        function respondAoe(useIt) {
            var pend = gState.pending;
            if (!pend || pend.kind !== 'aoe') return;
            if (myPlayerIdx !== pend.responderIdx) return;
            var targetIdx = pend.targetIdx;
            var targetP = gState.playersData[targetIdx];
            var st = gState.aoeState;
            gState.pending = null;

            if (useIt) {
                var idx = targetP.hand.findIndex(function(c){ return c.displayType === pend.needType; });
                if (idx > -1) {
                    var usedCard = targetP.hand.splice(idx, 1)[0];
                    gState.discardPile.push(usedCard);
                    recordPlayedCard(usedCard, targetP.id);
                    gState.gameLogHtml += "<br>🛡️ 【玩家 " + targetP.id + "】 打出【" + pend.cardName + "】抵消了傷害。";
                }
            } else {
                gState.gameLogHtml += "<br>💥 【玩家 " + targetP.id + "】 選擇不出【" + pend.cardName + "】，受到 1 點傷害！";
                damagePlayerBackend(targetIdx, 1);
            }
            if (st) {
                st.pos++;
                if (gState.pending && gState.pending.kind === 'peach') {
                    gState.aoeState.resumeAfterPeach = true;
                    updateCloud();
                    return;
                }
                askNextAoeTarget();
            }
            updateCloud();
        }

        // =====================================================================
        //  待回應流程：殺 → 等對方出閃
        // =====================================================================
        function askForDodge(sourceIdx, targetIdx) {
            var targetP = gState.playersData[targetIdx];
            if (!targetP.hand) targetP.hand = [];
            var hasDodge = targetP.hand.some(function(c){ return c.displayType === 'dodge'; });
            if (!hasDodge) {
                // 沒有閃可出，直接結算傷害
                gState.gameLogHtml += "<br>💥 【玩家 " + targetP.id + "】 沒有【閃】可用，受到 1 點傷害！";
                damagePlayerBackend(targetIdx, 1);
                checkWinConditionBackend();
                if (gState.pending && gState.pending.kind === 'peach') { return; }
                postEffectCleanup(sourceIdx);
                return;
            }
            gState.pending = {
                kind: 'dodge',
                responderIdx: targetIdx,
                sourceIdx: sourceIdx,
                targetIdx: targetIdx,
                cardName: '殺',
                ctx: {}
            };
        }

        // 玩家對「出閃」詢問做選擇
        function respondDodge(useIt) {
            var pend = gState.pending;
            if (!pend || pend.kind !== 'dodge') return;
            if (myPlayerIdx !== pend.responderIdx) return;
            var targetP = gState.playersData[pend.targetIdx];
            var sourceIdx = pend.sourceIdx;
            var targetIdx = pend.targetIdx;

            if (useIt) {
                var dIdx = targetP.hand.findIndex(function(c){ return c.displayType === 'dodge'; });
                if (dIdx > -1) {
                    var dCard = targetP.hand.splice(dIdx, 1)[0];
                    gState.discardPile.push(dCard);
                    recordPlayedCard(dCard, targetP.id); // 觸發出牌動畫
                    gState.gameLogHtml += "<br>🛡️ 【玩家 " + targetP.id + "】 打出了【閃】，成功抵消【殺】！";
                }
                gState.pending = null;
                postEffectCleanup(sourceIdx);
            } else {
                gState.gameLogHtml += "<br>💥 【玩家 " + targetP.id + "】 選擇不閃，受到 1 點傷害！";
                gState.pending = null;          // 先清掉 dodge pending
                damagePlayerBackend(targetIdx, 1); // 可能設置 peach pending
                checkWinConditionBackend();
                postEffectCleanup(sourceIdx);    // 若為 peach pending 會自動停住
            }
        }

        // =====================================================================
        //  待回應流程：決鬥 → 輪流出殺
        // =====================================================================
        function beginDuel(sourceIdx, targetIdx) {
            // 決鬥規則：被決鬥者先出殺，接著發動者，輪流。先出不了殺的一方受傷。
            askDuelKill(sourceIdx, targetIdx, targetIdx);
        }

        // whoseTurnIdx：目前該誰出殺
        function askDuelKill(sourceIdx, targetIdx, whoseTurnIdx) {
            var actor = gState.playersData[whoseTurnIdx];
            if (!actor.hand) actor.hand = [];
            var hasKill = actor.hand.some(function(c){ return c.displayType === 'kill'; });
            if (!hasKill) {
                // 出不了殺 → 受傷，決鬥結束
                gState.gameLogHtml += "<br>🏹 【玩家 " + actor.id + "】 打不出【殺】，決鬥落敗受到 1 點傷害！";
                gState.pending = null;
                damagePlayerBackend(whoseTurnIdx, 1);
                checkWinConditionBackend();
                if (gState.pending && gState.pending.kind === 'peach') { updateCloud(); return; }
                // 若發動方在決鬥中陣亡，交棒防卡死
                if (!gState.playersData[sourceIdx].isAlive && !gState.isGameOver) {
                    executeTurnSwitchBackend();
                } else {
                    postEffectCleanup(sourceIdx);
                }
                return;
            }
            gState.pending = {
                kind: 'duel',
                responderIdx: whoseTurnIdx,
                sourceIdx: sourceIdx,
                targetIdx: targetIdx,
                cardName: '決鬥',
                ctx: { whoseTurnIdx: whoseTurnIdx }
            };
        }

        function respondDuel(useIt) {
            var pend = gState.pending;
            if (!pend || pend.kind !== 'duel') return;
            if (myPlayerIdx !== pend.responderIdx) return;
            var sourceIdx = pend.sourceIdx, targetIdx = pend.targetIdx;
            var whoseTurnIdx = pend.ctx.whoseTurnIdx;
            var actor = gState.playersData[whoseTurnIdx];

            if (useIt) {
                var kIdx = actor.hand.findIndex(function(c){ return c.displayType === 'kill'; });
                if (kIdx > -1) {
                    var kCard = actor.hand.splice(kIdx, 1)[0];
                    gState.discardPile.push(kCard);
                    recordPlayedCard(kCard, actor.id); // 觸發出牌動畫
                    gState.gameLogHtml += "<br>🗡️ 【玩家 " + actor.id + "】 在決鬥中打出一張【殺】！";
                }
                gState.pending = null;
                // 換對方出殺
                var nextIdx = (whoseTurnIdx === sourceIdx) ? targetIdx : sourceIdx;
                askDuelKill(sourceIdx, targetIdx, nextIdx);
                updateCloud();
            } else {
                // 放棄出殺 → 受傷，決鬥結束
                gState.gameLogHtml += "<br>🏹 【玩家 " + actor.id + "】 放棄出殺，決鬥落敗受到 1 點傷害！";
                gState.pending = null;
                damagePlayerBackend(whoseTurnIdx, 1);
                checkWinConditionBackend();
                if (gState.pending && gState.pending.kind === 'peach') { updateCloud(); return; }
                if (!gState.playersData[sourceIdx].isAlive && !gState.isGameOver) {
                    executeTurnSwitchBackend();
                } else {
                    postEffectCleanup(sourceIdx);
                }
                updateCloud();
            }
        }

        // 效果結算完成後的統一收尾（檢查發動方是否陣亡需交棒）
        function postEffectCleanup(sourceIdx) {
            if (gState.isGameOver) { updateCloud(); return; }
            // 若有人處於瀕死（索桃進行中），優先處理
            if (gState.pending && gState.pending.kind === 'peach') { updateCloud(); return; }
            // 若群體錦囊（南蠻/萬箭）因某人瀕死而中斷，求桃結束後繼續處理佇列
            if (gState.aoeState && gState.aoeState.resumeAfterPeach) {
                gState.aoeState.resumeAfterPeach = false;
                askNextAoeTarget();
                return;
            }
            if (sourceIdx != null && gState.playersData[sourceIdx] && !gState.playersData[sourceIdx].isAlive) {
                executeTurnSwitchBackend();
                return;
            }
            updateCloud();
        }

        // =====================================================================
        //  選牌：過河拆橋 / 順手牽羊，由發動者點選目標一張手牌
        // =====================================================================
        function pickTargetCard(ownerIdx, cardIdx) {
            var pk = gState.pickCard;
            if (!pk) return;
            if (myPlayerIdx !== pk.sourceIdx) return;       // 只有發動者能選
            if (ownerIdx !== pk.targetIdx) return;          // 只能點被指定目標的牌
            var sourceP = gState.playersData[pk.sourceIdx];
            var targetP = gState.playersData[pk.targetIdx];
            if (!targetP.hand || cardIdx < 0 || cardIdx >= targetP.hand.length) return;

            var taken = targetP.hand.splice(cardIdx, 1)[0];
            if (pk.mode === 'bridge') {
                gState.discardPile.push(taken);
                gState.gameLogHtml += "<br>💨 【玩家 " + sourceP.id + "】 拆掉並棄置了【玩家 " + targetP.id + "】的一張手牌。";
            } else { // snatch
                if (!sourceP.hand) sourceP.hand = [];
                sourceP.hand.push(taken);
                gState.gameLogHtml += "<br>🦅 【玩家 " + sourceP.id + "】 順走了【玩家 " + targetP.id + "】的一張手牌！";
            }
            var src = pk.sourceIdx;
            gState.pickCard = null;
            checkWinConditionBackend();
            postEffectCleanup(src);
        }

        // =====================================================================
        //  瀕死求桃：手動詢問全場是否出【桃】救援
        // =====================================================================
        // 進入瀕死後，從瀕死者自己開始，依序詢問有桃的人是否出桃
        function startPeachQuery(dyingIdx, resumeSourceIdx) {
            advancePeachQuery({ dyingIdx: dyingIdx, resumeSourceIdx: resumeSourceIdx, declined: {} });
        }

        function advancePeachQuery(ctx) {
            var dying = gState.playersData[ctx.dyingIdx];
            // 已脫離瀕死
            if (dying.hp > 0) {
                gState.pending = null;
                finishDying(ctx);
                return;
            }
            if (!ctx.declined) ctx.declined = {}; // 本輪已表態「不出桃」的玩家集合
            // 從瀕死者開始繞一圈，找「有桃、且本輪尚未拒絕」的存活玩家
            for (var step = 0; step < gState.totalPlayers; step++) {
                var idx = (ctx.dyingIdx + step) % gState.totalPlayers;
                if (ctx.declined[idx]) continue;          // 這輪已拒絕，略過
                var pp = gState.playersData[idx];
                if (!pp.isAlive || !pp.hand) continue;
                var hasPeach = pp.hand.some(function(c){ return c.displayType === 'peach'; });
                if (hasPeach) {
                    gState.pending = {
                        kind: 'peach',
                        responderIdx: idx,
                        sourceIdx: ctx.resumeSourceIdx,
                        targetIdx: ctx.dyingIdx,
                        cardName: '桃',
                        ctx: ctx
                    };
                    return;
                }
            }
            // 沒人能再出桃（或都拒絕了）
            gState.pending = null;
            finishDying(ctx);
        }

        function respondPeach(useIt) {
            var pend = gState.pending;
            if (!pend || pend.kind !== 'peach') return;
            if (myPlayerIdx !== pend.responderIdx) return;
            var ctx = pend.ctx;
            if (!ctx.declined) ctx.declined = {};
            var responder = gState.playersData[pend.responderIdx];
            var dying = gState.playersData[ctx.dyingIdx];

            if (useIt) {
                var peachIdx = responder.hand.findIndex(function(c){ return c.displayType === 'peach'; });
                if (peachIdx > -1) {
                    var peachCard = responder.hand.splice(peachIdx, 1)[0];
                    gState.discardPile.push(peachCard);
                    recordPlayedCard(peachCard, responder.id); // 觸發出牌動畫
                    healPlayerBackend(ctx.dyingIdx, 1);
                    gState.gameLogHtml += "<br>💖 【玩家 " + responder.id + "】 打出【桃】，【玩家 " + dying.id + "】血量回升至 " + dying.hp + "。";
                }
                // 出桃後局勢改變（血量上升），清空拒絕集合重新評估
                // （已脫離瀕死則 advancePeachQuery 會直接結束）
                ctx.declined = {};
                gState.pending = null;
                advancePeachQuery(ctx);
                updateCloud();
            } else {
                // 跳過：本輪此人不再被詢問
                ctx.declined[pend.responderIdx] = true;
                gState.pending = null;
                advancePeachQuery(ctx);
                updateCloud();
            }
        }

        // 索桃結束：仍 <=0 則陣亡
        function finishDying(ctx) {
            var dying = gState.playersData[ctx.dyingIdx];
            if (dying.hp <= 0) {
                dying.isAlive = false; dying.hand = [];
                gState.gameLogHtml += "<br>💀 【玩家 " + dying.id + "】 體力耗盡，宣告陣亡！！";
                // 記錄陣亡事件，讓所有視窗同步播放陣亡動畫
                gState.lastDeath = { playerIdx: ctx.dyingIdx, playerId: dying.id, ts: Date.now() };
            }
            checkWinConditionBackend();
            postEffectCleanup(ctx.resumeSourceIdx);
        }

        function damagePlayerBackend(pIdx, points) {
            var p = gState.playersData[pIdx];
            p.hp -= points;
            // 記錄受傷事件，讓所有視窗同步播放受傷動畫
            gState.lastDamage = { playerIdx: pIdx, points: points, ts: Date.now() };
            if (p.hp <= 0) {
                gState.gameLogHtml += "<br>🚨 【玩家 " + p.id + "】 進入【瀕死狀態】！需要【桃】救援...";
                // 啟動手動求桃流程（resumeSourceIdx 用當前回合方，索桃結束後回到該方收尾）
                startPeachQuery(pIdx, gState.currentPlayerIdx);
            }
        }

        // 補血並記錄治療事件（給所有視窗同步播放治療動畫）
        function healPlayerBackend(pIdx, points) {
            var p = gState.playersData[pIdx];
            if (!p) return;
            p.hp += points;
            gState.lastHeal = { playerIdx: pIdx, points: points, ts: Date.now() };
        }

        function confirmDiscard(pIdx) {
            if (!gState.isDiscardStage || gState.isGameOver || gState.currentPlayerIdx !== pIdx) return;
            if (myPlayerIdx !== pIdx) return; // 只有當事人視窗能確認
            if (!gState.selectedDiscardIndices) gState.selectedDiscardIndices = [];
            if (!gState.discardPile) gState.discardPile = []; // 安全檢查：雲端舊資料可能缺此欄位

            var p = gState.playersData[pIdx];
            if (!p.hand) p.hand = [];

            // 防護：去重 + 過濾無效索引（避免雲端延遲造成索引與手牌不同步而錯刪/少刪）
            var validSet = {};
            var validIdx = [];
            for (var s = 0; s < gState.selectedDiscardIndices.length; s++) {
                var ix = gState.selectedDiscardIndices[s];
                if (typeof ix === 'number' && ix >= 0 && ix < p.hand.length && !validSet[ix]) {
                    validSet[ix] = true;
                    validIdx.push(ix);
                }
            }
            // 數量必須剛好等於需求，否則不放行（並把選擇修正為有效集合）
            if (validIdx.length !== gState.requiredDiscardCount) {
                gState.selectedDiscardIndices = validIdx;
                updateCloud();
                return;
            }

            // 由大到小排序後 splice，從後往前刪不會造成索引位移
            validIdx.sort(function(a, b){ return b - a; });
            for (var i = 0; i < validIdx.length; i++) {
                var discarded = p.hand.splice(validIdx[i], 1)[0];
                if (discarded) gState.discardPile.push(discarded);
            }
            gState.gameLogHtml += "<br>🗑️ 【玩家 " + p.id + "】 完成了棄牌。";
            gState.isDiscardStage = false;
            gState.requiredDiscardCount = 0;
            gState.selectedDiscardIndices = [];
            p.selectedIndex = -1;
            executeTurnSwitchBackend();
        }

        function endTurn(pIdx) {
            if (gState.isGameOver || gState.currentPlayerIdx !== pIdx || myPlayerIdx !== pIdx || gState.isDiscardStage) return;
            if (gState.pending != null || gState.pickCard != null) return;
            var p = gState.playersData[pIdx];
            if (!p.hand) p.hand = [];
            if (p.hand.length > p.hp) {
                gState.isDiscardStage = true;
                gState.requiredDiscardCount = p.hand.length - p.hp;
                gState.selectedDiscardIndices = [];
                p.selectedIndex = -1;
                cancelTargetSelection();
                gState.gameLogHtml += "<br>⏳ 【玩家 " + p.id + "】手牌溢出，進入棄牌階段。";
                updateCloud();
            } else {
                executeTurnSwitchBackend();
            }
        }

        function executeTurnSwitchBackend() {
            gState.hasUsedKillThisTurn = false;
            cancelTargetSelection();
            
            var aliveCount = 0;
            for (var i = 0; i < gState.totalPlayers; i++) {
                if (gState.playersData[i].isAlive) aliveCount++;
            }
            if (aliveCount <= 1) { checkWinConditionBackend(); updateCloud(); return; }

            var nextIdx = gState.currentPlayerIdx;
            while (true) {
                nextIdx = (nextIdx + 1) % gState.totalPlayers;
                if (gState.playersData[nextIdx].isAlive) {
                    gState.currentPlayerIdx = nextIdx;
                    break;
                }
            }
            gState.gameLogHtml += "<br>--------------------------------------------------<br>📣 輪到 【 玩家 " + gState.playersData[gState.currentPlayerIdx].id + " 】 的大回合開始！";
            for(var i=0; i<gState.totalPlayers; i++) gState.playersData[i].selectedIndex = -1;
            drawCardsBackend(gState.currentPlayerIdx, 2);
            updateCloud();
        }

        function checkWinConditionBackend() {
            var aliveCount = 0; var winnerP = null; var winnerIdx = -1;
            for (var i = 0; i < gState.totalPlayers; i++) {
                if (gState.playersData[i].isAlive) { aliveCount++; winnerP = gState.playersData[i]; winnerIdx = i; }
            }
            if (aliveCount === 1 && winnerP) {
                gState.gameLogHtml += "<br>🏆 🎉 遊戲結束！【玩家 " + winnerP.id + "】 成功奪得天下！";
                gState.isGameOver = true;
                // 記錄勝者資訊，讓所有視窗同步跳出勝利畫面
                gState.winnerInfo = { playerIdx: winnerIdx, playerId: winnerP.id, ts: Date.now() };
            }
        }

        function getCardNameChinese(type) {
            var trans = { 'kill':'殺', 'dodge':'閃', 'peach':'桃', 'bridge':'過河拆橋', 'snatch':'順手牽羊', 'duel':'決鬥', 'wuzhong':'無中生有', 'wuxie':'無懈可擊', 'nanman':'南蠻入侵', 'wanjian':'萬箭齊發', 'taoyuan':'桃園結義', 'wugu':'五穀豐登' };
            return trans[type] || '未知牌';
        }

        function getCardContentHtml(card) {
            var nameHtml = '<div class="' + card.colorClass + '" style="margin-top:2px; font-size:16px;">' + card.suit + card.name + '</div>';
            var suitHtml = '';
            if (card.displayType === 'kill') suitHtml = '<div><span class="kill-badge">殺</span></div>';
            else if (card.displayType === 'peach') suitHtml = '<div><span class="peach-badge">桃</span></div>';
            else if (card.displayType === 'dodge') suitHtml = '<div><span class="dodge-badge">閃</span></div>';
            else if (card.displayType === 'duel') suitHtml = '<div><span class="duel-badge">決鬥</span></div>';
            else if (card.displayType === 'bridge') suitHtml = '<div><span class="bridge-badge">過河<br>拆橋</span></div>';
            else if (card.displayType === 'snatch') suitHtml = '<div><span class="snatch-badge">順手<br>牽羊</span></div>';
            else if (card.displayType === 'wuzhong') suitHtml = '<div><span class="wuzhong-badge">無中<br>生有</span></div>';
            else if (card.displayType === 'wuxie') suitHtml = '<div><span class="wuxie-badge">無懈<br>可擊</span></div>';
            else if (card.displayType === 'nanman') suitHtml = '<div><span class="aoe-badge">南蠻<br>入侵</span></div>';
            else if (card.displayType === 'wanjian') suitHtml = '<div><span class="aoe-badge">萬箭<br>齊發</span></div>';
            else if (card.displayType === 'taoyuan') suitHtml = '<div><span class="group-badge">桃園<br>結義</span></div>';
            else if (card.displayType === 'wugu') suitHtml = '<div><span class="group-badge">五穀<br>豐登</span></div>';
            return nameHtml + suitHtml;
        }

        // 渲染待回應/選牌面板
        function renderResponsePanel() {
            var panel = document.getElementById('response-panel');
            if (!panel) return;

            // 選牌階段（過河拆橋/順手牽羊）
            if (gState.pickCard) {
                var pk = gState.pickCard;
                var srcId = gState.playersData[pk.sourceIdx].id;
                var tgtId = gState.playersData[pk.targetIdx].id;
                var modeName = (pk.mode === 'bridge') ? '過河拆橋' : '順手牽羊';
                if (myPlayerIdx === pk.sourceIdx) {
                    panel.style.display = 'block';
                    panel.innerHTML = "🔎 【" + modeName + "】請在下方點選【玩家 " + tgtId + "】的一張手牌。";
                } else {
                    panel.style.display = 'block';
                    panel.innerHTML = "⏳ 等待【玩家 " + srcId + "】對【玩家 " + tgtId + "】執行【" + modeName + "】選牌中…";
                }
                return;
            }

            var pend = gState.pending;
            if (!pend) { panel.style.display = 'none'; panel.innerHTML = ''; return; }

            panel.style.display = 'block';
            var responderId = gState.playersData[pend.responderIdx].id;
            var amResponder = (myPlayerIdx === pend.responderIdx);

            // 非當事人：只顯示等待訊息
            if (!amResponder) {
                var waitMsg = "⏳ 等待【玩家 " + responderId + "】回應";
                if (pend.kind === 'dodge') waitMsg += "是否打出【閃】…";
                else if (pend.kind === 'wuxie') waitMsg += "是否打出【無懈可擊】…";
                else if (pend.kind === 'duel') waitMsg += "是否打出【殺】（決鬥）…";
                else if (pend.kind === 'peach') waitMsg += "是否打出【桃】救援…";
                else if (pend.kind === 'aoe') waitMsg += "是否打出【" + pend.cardName + "】…";
                panel.innerHTML = waitMsg;
                return;
            }

            // 我就是要回應的人 → 顯示按鈕
            var html = "", yes = "", no = "";
            if (pend.kind === 'dodge') {
                html = "⚔️ 你被【殺】指定！是否打出【閃】？";
                yes = "🛡️ 出【閃】"; no = "💥 不閃（受 1 傷害）";
                html += panelBtns("respondDodge");
            } else if (pend.kind === 'wuxie') {
                html = "🟣 一張【" + pend.cardName + "】正在結算，你要打出【無懈可擊】嗎？";
                yes = "🟣 出【無懈】"; no = "跳過";
                html += panelBtns("respondWuxie");
            } else if (pend.kind === 'duel') {
                html = "⚡ 決鬥中！輪到你打出【殺】，否則受傷。";
                yes = "🗡️ 出【殺】"; no = "🏹 放棄（受 1 傷害）";
                html += panelBtns("respondDuel");
            } else if (pend.kind === 'peach') {
                var dyingId = gState.playersData[pend.targetIdx].id;
                if (pend.responderIdx === pend.targetIdx) html = "🚨 你瀕死！是否打出【桃】自救？";
                else html = "🚨 【玩家 " + dyingId + "】瀕死，你是否打出【桃】救援？";
                yes = "💖 出【桃】"; no = "不出";
                html += panelBtns("respondPeach");
            } else if (pend.kind === 'aoe') {
                var aoeName = (pend.needType === 'kill') ? '南蠻入侵' : '萬箭齊發';
                html = "🎴 你受到【" + aoeName + "】影響！是否打出【" + pend.cardName + "】？";
                yes = "🛡️ 出【" + pend.cardName + "】"; no = "💥 不出（受 1 傷害）";
                html += panelBtns("respondAoe");
            }
            // 填入按鈕文字
            panel.innerHTML = html.replace("__YES__", yes).replace("__NO__", no);
        }

        function panelBtns(fnName) {
            return '<div style="margin-top:10px;">' +
                '<button style="background-color:#4caf50; box-shadow:0 2px #2e7d32;" onclick="' + fnName + '(true)">__YES__</button>' +
                '<button style="background-color:#9e9e9e; box-shadow:0 2px #616161;" onclick="' + fnName + '(false)">__NO__</button>' +
                '</div>';
        }

        // 核心同步渲染畫面
        function syncRenderUI() {
            // 更新日誌
            var logBox = document.getElementById('game-log');
            logBox.innerHTML = gState.gameLogHtml || "等待開局...";
            logBox.scrollTop = logBox.scrollHeight;

            // 比對日誌新增內容，自動播放對應音效（所有連線視窗皆會觸發）
            detectAndPlaySounds(gState.gameLogHtml || "");

            // 偵測「最近一次出牌」是否更新，若有就播放出牌動畫
            if (gState.lastPlayedCard && gState.lastPlayedCard.ts && gState.lastPlayedCard.ts > lastPlayedCardTs) {
                lastPlayedCardTs = gState.lastPlayedCard.ts;
                showPlayedCardEffect(gState.lastPlayedCard);
            }

            // 偵測「最近一次受傷」是否更新，若有就播放受傷震動閃紅動畫
            if (gState.lastDamage && gState.lastDamage.ts && gState.lastDamage.ts > lastDamageTs) {
                lastDamageTs = gState.lastDamage.ts;
                triggerDamageEffect(gState.lastDamage.playerIdx);
            }

            // 偵測「最近一次治療」是否更新，若有就播放治療綠光與愛心動畫
            if (gState.lastHeal && gState.lastHeal.ts && gState.lastHeal.ts > lastHealTs) {
                lastHealTs = gState.lastHeal.ts;
                triggerHealEffect(gState.lastHeal.playerIdx);
            }

            // 偵測陣亡，播放陣亡動畫（所有視窗同步）
            if (gState.lastDeath && gState.lastDeath.ts && gState.lastDeath.ts > lastDeathTs) {
                lastDeathTs = gState.lastDeath.ts;
                triggerDeathEffect(gState.lastDeath.playerIdx);
            }

            // 偵測勝利，跳出勝利彈窗（所有視窗同步）
            if (gState.winnerInfo && gState.winnerInfo.ts && gState.winnerInfo.ts > lastWinnerTs) {
                lastWinnerTs = gState.winnerInfo.ts;
                showVictoryOverlay(gState.winnerInfo);
            }

            refreshIdentityLock();
            renderResponsePanel();

            var dCount = gState.deck ? gState.deck.length : 0;
            var discCount = gState.discardPile ? gState.discardPile.length : 0;
            document.getElementById('deck-count').innerText = "🔮 雲端剩餘牌數：" + dCount + " 張 | 已棄牌數：" + discCount + " 張";

            var wrapper = document.getElementById('players-wrapper');
            wrapper.innerHTML = ""; // 重洗

            // 以實際玩家資料長度為準（避免 totalPlayers 與 playersData 不同步時讀到 undefined）
            var pdata = Array.isArray(gState.playersData) ? gState.playersData : [];
            var renderCount = Math.min(gState.totalPlayers || pdata.length, pdata.length);

            for (var i = 0; i < renderCount; i++) {
                var p = gState.playersData[i];
                if (!p) continue; // 防呆：資料未就緒則跳過此格
                var colorStyle = getPlayerThemeColor(i);
                if(!p.hand) p.hand = [];

                // 建立 HTML 元素
                var pBox = document.createElement('div');
                pBox.id = "pbox-" + i;
                pBox.className = "box-player";
                // 若這個玩家剛受傷且動畫還沒結束（750ms 內），帶上 damaged class 維持動畫
                if (gState.lastDamage && gState.lastDamage.playerIdx === i && gState.lastDamage.ts
                    && (Date.now() - gState.lastDamage.ts) < 750) {
                    pBox.className += " damaged";
                }
                // 若這個玩家剛被治療且動畫還沒結束（1050ms 內），帶上 healed class 維持動畫
                if (gState.lastHeal && gState.lastHeal.playerIdx === i && gState.lastHeal.ts
                    && (Date.now() - gState.lastHeal.ts) < 1050) {
                    pBox.className += " healed";
                }
                pBox.setAttribute("onclick", "handlePlayerBlockClick(" + i + ")");

                var deadStr = p.isAlive ? "" : " <span style='color:red;'>[陣亡]</span>";
                var maxHp = (typeof p.maxHp === 'number' && p.maxHp > 0) ? p.maxHp : 4;
                var emptyHearts = Math.max(0, maxHp - p.hp);
                var hpStr = p.hp <= 0 ? "💀 瀕死結算中" : "💖".repeat(Math.max(0, p.hp)) + "🖤".repeat(emptyHearts);

                // 玩家名字（若已設定）顯示在玩家編號下方
                var pname = (gState.playerNames && gState.playerNames[i]) ? String(gState.playerNames[i]).slice(0, 6) : "";
                var nameHtml = pname
                    ? '<div style="font-size:16px; color:#ffd700; font-weight:bold; margin-top:-4px; margin-bottom:4px; text-shadow:0 1px 2px rgba(0,0,0,0.6);">「' + escapeHtml(pname) + '」</div>'
                    : '';

                var innerHtml = '<div style="text-align: left; font-weight: bold; color: ' + colorStyle + '; font-size: 22px;">👤 玩家 ' + p.id + deadStr + '</div>' +
                                nameHtml +
                                '<div class="hp-display">' + hpStr + ' (' + p.hp + '/' + maxHp + ')</div>' +
                                '<div id="pcards-' + i + '" class="cards-area" onclick="event.stopPropagation();"></div>' + 
                                '<div>' +
                                    '<button id="pbtn-play-' + i + '" class="btn-action" style="background-color:'+colorStyle+';" onclick="event.stopPropagation(); useCard(' + i + ')">使用卡牌</button>' +
                                    '<button id="pbtn-end-' + i + '" class="btn-end" onclick="event.stopPropagation(); endTurn(' + i + ')">結束回合</button>' +
                                '</div>';
                pBox.innerHTML = innerHtml;
                wrapper.appendChild(pBox);

                var pCardsEl = document.getElementById('pcards-' + i);
                var btnPlay = document.getElementById('pbtn-play-' + i);
                var btnEnd = document.getElementById('pbtn-end-' + i);

                if (!p.isAlive) {
                    // 若正在陣亡動畫期間（1.4 秒內），保留動畫不要立刻變暗
                    var inDeathAnim = gState.lastDeath && gState.lastDeath.playerIdx === i && gState.lastDeath.ts
                        && (Date.now() - gState.lastDeath.ts) < 1400;
                    if (inDeathAnim) {
                        pCardsEl.innerHTML = '已陣亡';
                        btnPlay.disabled = true; btnEnd.disabled = true;
                        pBox.classList.add('death-anim');
                        // 重新掛上骷髏（重渲染會清掉舊的）
                        var sk = document.createElement('div');
                        sk.className = 'death-skull';
                        sk.textContent = '💀';
                        pBox.appendChild(sk);
                        setTimeout((function(b){ return function(){ if(b){ b.style.opacity='0.2'; } }; })(pBox), 1400 - (Date.now() - gState.lastDeath.ts));
                        continue;
                    }
                    pBox.style.opacity = "0.2"; pCardsEl.innerHTML = '已陣亡';
                    btnPlay.disabled = true; btnEnd.disabled = true;
                    continue;
                }

                // 👁️ 戰爭迷霧判定（已移除旁觀者天眼）：
                // 玩家只能看見跟自己 myPlayerIdx 相符的手牌，別人的都顯示為牌背。
                // 未選擇身份(-2)者一律看牌背，杜絕開頁面即偷看。
                var canSeeThisHand = (myPlayerIdx === i);

                // 選牌階段：發動者要能點「目標」的手牌（即使看不到內容）
                var isPickingFromThis = gState.pickCard
                    && gState.pickCard.targetIdx === i
                    && gState.pickCard.sourceIdx === myPlayerIdx;

                var cardsHtml = "";
                for (var j = 0; j < p.hand.length; j++) {
                    if (canSeeThisHand) {
                        var cls = ' card';
                        if (gState.isDiscardStage && gState.currentPlayerIdx === i) {
                            if (gState.selectedDiscardIndices && gState.selectedDiscardIndices.includes(j)) cls += ' discard-selected';
                        } else {
                            if (p.selectedIndex === j) cls += ' selected';
                        }
                        var clickHandler = isPickingFromThis
                            ? 'pickTargetCard(' + i + ', ' + j + ')'
                            : 'selectCard(' + i + ', ' + j + ')';
                        if (isPickingFromThis) cls += ' selectable-pick';
                        cardsHtml += '<div class="' + cls + '" onclick="' + clickHandler + '">' + getCardContentHtml(p.hand[j]) + '</div>';
                    } else if (isPickingFromThis) {
                        // 看不到內容但要能選（拆橋/順手對盲牌）
                        cardsHtml += '<div class="card card-back selectable-pick" onclick="pickTargetCard(' + i + ', ' + j + ')"><span>🃏</span><span style="font-size:11px; margin-top:5px; color:#aaa;">點此選取</span></div>';
                    } else {
                        cardsHtml += '<div class="card card-back"><span>🃏</span><span style="font-size:11px; margin-top:5px; color:#aaa;">手牌</span></div>';
                    }
                }
                pCardsEl.innerHTML = cardsHtml || '<span style="color:#666;">無手牌</span>';

                // 全域鎖：有待回應 / 選牌進行中，所有人的一般操作按鈕都停用
                var globalLock = (gState.pending != null) || (gState.pickCard != null);

                // 按鈕控制與提示行
                if (globalLock) {
                    btnPlay.disabled = true;
                    btnEnd.disabled = true;
                    if (gState.currentPlayerIdx === i) {
                        pBox.style.opacity = "1";
                        pBox.style.borderColor = colorStyle;
                        pBox.style.boxShadow = "0 0 15px " + colorStyle;
                    } else {
                        pBox.style.opacity = "0.5";
                    }
                    document.getElementById('turn-prompt').innerText = "⏸️ 結算中，請依下方面板回應…";
                } else if (gState.isSelectingTarget) {
                    if (gState.currentPlayerIdx === i) {
                        if (myPlayerIdx === i) {
                            document.getElementById('turn-prompt').innerText = "🎯 [你行動中] 請點擊敵方玩家發動【" + gState.targetSelectCardName + "】";
                        }
                        pBox.style.boxShadow = "0 0 12px " + colorStyle;
                    } else {
                        pBox.classList.add('selectable-target');
                    }
                    btnPlay.disabled = true; btnEnd.disabled = true;
                } else {
                    if (gState.currentPlayerIdx === i) {
                        pBox.style.opacity = "1";
                        pBox.style.borderColor = colorStyle;
                        pBox.style.boxShadow = "0 0 15px " + colorStyle;

                        if (gState.isDiscardStage) {
                            document.getElementById('turn-prompt').innerText = "⚠️ 【 玩家 " + p.id + " 】手牌溢出，請點選卡牌棄置";
                            // 只計算「在目前手牌範圍內、不重複」的有效選擇，避免延遲殘留造成計數錯誤
                            var seenSel = {}, validSelCount = 0;
                            var selArr = gState.selectedDiscardIndices || [];
                            for (var sIdx = 0; sIdx < selArr.length; sIdx++) {
                                var sv = selArr[sIdx];
                                if (typeof sv === 'number' && sv >= 0 && sv < p.hand.length && !seenSel[sv]) {
                                    seenSel[sv] = true; validSelCount++;
                                }
                            }
                            btnPlay.innerText = "確認棄牌 (" + validSelCount + " / " + gState.requiredDiscardCount + ")";
                            btnPlay.setAttribute("onclick", "event.stopPropagation(); confirmDiscard(" + i + ")");
                            btnPlay.disabled = (validSelCount !== gState.requiredDiscardCount || myPlayerIdx !== i);
                            btnEnd.disabled = true;
                        } else {
                            document.getElementById('turn-prompt').innerText = "👉 目前回合行動方：【 玩家 " + p.id + " 】";
                            btnPlay.disabled = (myPlayerIdx !== i);
                            btnEnd.disabled = (myPlayerIdx !== i);
                        }
                    } else {
                        pBox.style.opacity = "0.4";
                        btnPlay.disabled = true; btnEnd.disabled = true;
                    }
                }
            }

            // 尚未選擇身份且戰局進行中：提醒先選身份（此時看到的全是牌背）
            if (myPlayerIdx === -2 && isGameRunning() && !gState.isGameOver) {
                document.getElementById('turn-prompt').innerText = "🔒 請先於右上角選擇你的身份才能查看手牌與行動";
                document.getElementById('turn-prompt').style.color = "#ff9800";
            }

            if (gState.isGameOver) {
                document.getElementById('turn-prompt').innerText = "🏁 戰局宣告結束！";
                document.getElementById('turn-prompt').style.color = "#d61c1c";
            }
        }

        // 開局載入監聽
        initRoomSync();
        startHeartbeat();

        // 視窗關閉/重整前，主動釋放本視窗占用的座位（讓座位立即釋出，不用等心跳逾時）
        window.addEventListener('beforeunload', function() {
            try {
                if (myPlayerIdx >= 0 && gState && gState.claimedSeats &&
                    gState.claimedSeats[myPlayerIdx] === myClientId &&
                    !isGameRunning()) {
                    // 僅在「尚未開局」時主動讓位；對戰進行中不釋放，避免誤清正在玩的人
                    releaseMySeat();
                    updateCloud();
                }
            } catch (e) {}
        });
    </script>
</body>
</html>
